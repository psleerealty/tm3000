<style>
:root{
  /* "Twilight adventure" palette — cooler + deeper than the original pastels.
     Var names kept (game.js references --gold/--coral inline); only values changed.
     --ink matches the sprite outline (#3B2F5E) so panel borders read like the art. */
  --ink:#3B2F5E; --cream:#F4F6FC;
  --sky1:#3D4E97; --sky2:#4E7BBD; --sky3:#6FB1CE;
  --pink:#FF7847; --coral:#EF5B2E; --gold:#F2B32B; --mint:#35C98B; --blue:#4E9BE0; --lav:#A9B2D4;
  --card-shadow:0 6px 0 rgba(24,30,66,.16), 0 14px 24px rgba(14,20,48,.3);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif; color:var(--ink);
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:12px 12px 104px; overflow-x:hidden;
  user-select:none; -webkit-user-select:none;
  background:linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 55%, var(--sky3) 100%);
  background-attachment:fixed;
}
h1,h2,h3{font-family:'Baloo 2',system-ui,sans-serif;}
.px{image-rendering:pixelated; image-rendering:crisp-edges; display:inline-block; vertical-align:middle;}
.pixel{font-family:'Press Start 2P',monospace; letter-spacing:0;}

/* night-adventure sky — clouds stay but faint, so the sky reads calm, not candy */
.cloud{position:fixed; background:rgba(255,255,255,.14); border-radius:999px; filter:blur(3px); z-index:0; pointer-events:none;}
.cloud.c1{width:220px;height:70px; top:8%; left:-60px; animation:drift 70s linear infinite;}
.cloud.c2{width:160px;height:52px; top:30%; right:-40px; animation:drift 90s linear infinite reverse;}
.cloud.c3{width:260px;height:80px; bottom:12%; left:10%; animation:drift 110s linear infinite;}
@keyframes drift{from{transform:translateX(-15vw)}to{transform:translateX(115vw)}}
.spark{position:fixed; z-index:0; pointer-events:none; animation:floatup 5s ease-in forwards;}
@keyframes floatup{from{transform:translateY(0) scale(1); opacity:.9}to{transform:translateY(-30vh) scale(.4); opacity:0}}

.wrap{width:100%; max-width:520px; display:flex; flex-direction:column; gap:14px; position:relative; z-index:1;}

/* MACHINE */
.machine{
  background:linear-gradient(180deg,#FFFFFF 0%, var(--cream) 100%);
  border:3px solid rgba(59,47,94,.65); border-radius:18px;
  box-shadow:var(--card-shadow); padding:12px 16px; position:relative;
  display:flex; align-items:center; gap:14px;
}
.machine .headwrap{position:relative; animation:bob 3.5s ease-in-out infinite; flex:0 0 auto;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.machine .orb{position:absolute; top:-6px; right:-14px; width:14px; height:14px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #fff, var(--gold) 60%);
  box-shadow:0 0 12px 3px rgba(247,201,72,.7); animation:orbfloat 2.6s ease-in-out infinite;}
@keyframes orbfloat{0%,100%{transform:translate(0,0)}50%{transform:translate(5px,-6px)}}
#machineCanvas{width:96px; height:96px; cursor:pointer;}
.machine .info{flex:1; min-width:0;}
.mtitle{font-family:'Press Start 2P'; font-size:11px; line-height:1.5; color:var(--ink); cursor:pointer;}
.lvl{font-family:'Baloo 2'; font-size:12px; font-weight:800; color:#7B84AD; margin-top:3px;}
.hdr-tools{display:flex; align-items:center; gap:6px; margin-top:8px; flex-wrap:wrap;}
.toolbtn{background:linear-gradient(180deg,#fff,#E9EEFA); border:2px solid rgba(59,47,94,.55);
  border-radius:10px; padding:5px 7px; cursor:pointer; line-height:0; box-shadow:0 2px 0 rgba(45,50,95,.3);}
.toolbtn:active{transform:scale(.92);}
.toolbtn.on{background:linear-gradient(180deg,#FFD35C,var(--gold)); border-color:rgba(107,68,0,.55);}
.langchip{font-family:'Baloo 2'; font-weight:800; font-size:13px; color:var(--ink);
  background:linear-gradient(180deg,#fff,#E9EEFA); border:2px solid rgba(59,47,94,.55);
  border-radius:10px; padding:6px 11px; box-shadow:0 2px 0 rgba(45,50,95,.3); cursor:pointer;}
.langchip:active{transform:scale(.94);}

/* STAGE */
.stage{
  background:linear-gradient(180deg,#FFFFFF 0%, var(--cream) 100%);
  border:3px solid rgba(59,47,94,.65); border-radius:18px;
  box-shadow:var(--card-shadow); padding:22px 18px; min-height:340px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  text-align:center; position:relative; overflow:hidden;
}
.stage .bigsprite{line-height:0; filter:drop-shadow(0 5px 6px rgba(14,20,48,.3));}
.stage h2{margin:0; font-size:25px; font-weight:800;}
.stage p{margin:0; font-size:17px; font-weight:800; line-height:1.5;}
.divider{color:var(--gold); font-family:'Press Start 2P'; font-size:9px; letter-spacing:4px;}
.native{font-family:'Baloo 2'; font-size:42px; font-weight:800; margin:2px 0;}
.roman{font-size:20px; font-weight:800; color:var(--coral);}
.gloss{font-size:15px; color:#7B84AD; font-weight:800;}
.tag{font-family:'Press Start 2P'; font-size:10px; line-height:1.6; color:#5C3D00;
  background:linear-gradient(180deg,#FFD35C,var(--gold)); border:2px solid rgba(90,58,0,.55);
  border-radius:8px; padding:7px 14px; box-shadow:0 3px 0 rgba(90,58,0,.35);}
.stepdots{display:flex; gap:8px; align-items:center; justify-content:center;}
.stepdots .sd{opacity:.3;} .stepdots .sd.on{opacity:1;}

/* QUEST GUIDE — picture strip revealed by "Read quest" so pre-readers get a
   worked example (hear it -> do the action -> get a star). No new art: every
   panel is an existing sprite. Hidden until the speaker is tapped. */
.guide{display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
  padding:10px 8px; background:rgba(59,47,94,.06);
  border:2px dashed rgba(59,47,94,.35); border-radius:12px;}
.guide[hidden]{display:none;}
.guide .gpanel{line-height:0; filter:drop-shadow(0 2px 3px rgba(14,20,48,.22));}
.guide .garrow{font-family:'Press Start 2P'; font-size:11px; color:var(--gold);}
.guide.show>*{animation:pop .35s cubic-bezier(.2,1.6,.4,1) both;}
.guide.show>*:nth-child(2){animation-delay:.25s}
.guide.show>*:nth-child(3){animation-delay:.5s}
.guide.show>*:nth-child(4){animation-delay:.75s}
.guide.show>*:nth-child(5){animation-delay:1s}

/* BUTTONS */
.btn{font-family:'Baloo 2'; font-weight:800; font-size:20px; color:#fff;
  background:linear-gradient(180deg,var(--pink),var(--coral)); border:none; border-radius:14px;
  padding:16px 22px; width:100%; cursor:pointer; position:relative; overflow:hidden;
  box-shadow:0 5px 0 #B23E1E, inset 0 2px 0 rgba(255,255,255,.25);
  text-shadow:0 1px 2px rgba(0,0,0,.2); transition:transform .08s; display:flex;
  align-items:center; justify-content:center; gap:9px;}
.btn:active{transform:translateY(4px) scale(.98); box-shadow:0 1px 0 #B23E1E, inset 0 2px 0 rgba(255,255,255,.25);}
.btn.mint{background:linear-gradient(180deg,#5FE0AE,var(--mint)); color:#0B4A33; text-shadow:none;
  box-shadow:0 5px 0 #1E8A5E, inset 0 2px 0 rgba(255,255,255,.35);}
.btn.mint:active{box-shadow:0 1px 0 #1E8A5E, inset 0 2px 0 rgba(255,255,255,.35);}
.btn.sky{background:linear-gradient(180deg,#7FBCF0,var(--blue)); color:#0F3A63; text-shadow:none;
  box-shadow:0 5px 0 #2A6BA8, inset 0 2px 0 rgba(255,255,255,.35);}
.btn.sky:active{box-shadow:0 1px 0 #2A6BA8, inset 0 2px 0 rgba(255,255,255,.35);}
.btn.gold{background:linear-gradient(180deg,#FFD35C,var(--gold)); color:#5C3D00; text-shadow:none;
  box-shadow:0 5px 0 #A67514, inset 0 2px 0 rgba(255,255,255,.35);}
.btn.gold:active{box-shadow:0 1px 0 #A67514, inset 0 2px 0 rgba(255,255,255,.35);}
.btn.muted{background:linear-gradient(180deg,#D9DEEE,#B4BDD9); color:#3B2F5E; text-shadow:none;
  box-shadow:0 5px 0 #7C86AD, inset 0 2px 0 rgba(255,255,255,.35);}
.btn.muted:active{box-shadow:0 1px 0 #7C86AD, inset 0 2px 0 rgba(255,255,255,.35);}
.btn.small{width:auto; font-size:16px; padding:11px 17px;}
.btn.huge{font-size:24px; padding:22px; min-height:88px;}
.btnrow{display:flex; gap:10px; width:100%; justify-content:center; flex-wrap:wrap;}

/* WORLD PICKER — two big buttons on the quest board home. Free switch,
   no unlock gating; the selected world glows gold like the booth chips. */
.worldrow{display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%;}
.worldbtn{font-family:'Baloo 2'; font-weight:800; font-size:15px; color:var(--ink);
  min-height:64px; display:flex; align-items:center; justify-content:center; gap:8px;
  background:linear-gradient(180deg,#fff,#EDF1FA); border:3px solid rgba(59,47,94,.6);
  border-radius:14px; padding:8px 10px; cursor:pointer;
  box-shadow:0 4px 0 #8A93B8;}
.worldbtn:active{transform:translateY(3px); box-shadow:0 1px 0 #8A93B8;}
.worldbtn.sel{border-color:rgba(107,68,0,.6); background:linear-gradient(180deg,#FFE9A8,#FFD35C);
  box-shadow:0 4px 0 #A67514;}

/* TEACHER TURN — elder-facing sprite menu. Tiles must stay tap-friendly for
   older hands: >=96px targets, thick borders, obvious pressed state. */
.ttgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%;}
.tttile{min-height:96px; min-width:96px; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(180deg,#fff,#EDF1FA); border:4px solid rgba(59,47,94,.6);
  border-radius:16px; padding:8px; cursor:pointer; line-height:0;
  box-shadow:0 5px 0 #8A93B8;}
.ptile{position:relative; flex-direction:column; gap:5px;}
.ptile .pw{font-family:'Baloo 2'; font-size:12px; font-weight:800; color:var(--ink); line-height:1.1;}
.ptile .pmic{position:absolute; top:5px; right:6px; line-height:0;}
.tttile:active{transform:translateY(4px); border-color:var(--gold);
  background:linear-gradient(180deg,#FFE9A8,#FFD35C); box-shadow:0 1px 0 #A67514;}

.holdbtn{background:linear-gradient(180deg,var(--pink),var(--coral));}
.holdfill{position:absolute; inset:0; width:0%; background:rgba(255,255,255,.5);}
.holdlabel{position:relative; z-index:1; display:flex; align-items:center; gap:8px;}
.bars{display:flex; gap:5px; justify-content:center; align-items:flex-end; height:34px;}
.bars i{width:8px; background:linear-gradient(180deg,#5FE0AE,#1E8A5E); border-radius:2px;
  animation:bar .5s infinite alternate;}
.bars i:nth-child(2){animation-delay:.1s}.bars i:nth-child(3){animation-delay:.2s}
.bars i:nth-child(4){animation-delay:.3s}.bars i:nth-child(5){animation-delay:.15s}
@keyframes bar{from{height:8px}to{height:32px}}

/* TABS */
.tabbar{position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  width:calc(100% - 24px); max-width:520px; display:flex; gap:6px;
  background:rgba(34,32,66,.94); backdrop-filter:blur(8px);
  border:3px solid rgba(18,16,40,.7); border-radius:18px; padding:8px; z-index:50;
  box-shadow:0 10px 24px rgba(8,12,32,.45);}
.tab{flex:1; font-family:'Baloo 2'; font-weight:800; font-size:13px; color:#9FA8CF;
  background:transparent; border:none; border-radius:12px; padding:6px 4px; cursor:pointer; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:2px;}
.tab .t> {line-height:0;}
.tab.active{background:linear-gradient(180deg,#FFD35C,var(--gold)); color:#5C3D00; box-shadow:0 3px 0 rgba(0,0,0,.35);}

/* COLLECTION */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(104px,1fr)); gap:10px; width:100%;}
.card{border:2px solid rgba(59,47,94,.45); border-radius:12px; padding:8px 4px 6px; overflow:hidden; text-align:center;
  box-shadow:0 4px 0 rgba(24,30,66,.14); position:relative; line-height:0;}
.card.r0{background:linear-gradient(160deg,#F2F4FB,#DCE2F4);}
.card.r1{background:linear-gradient(160deg,#E9F4FF,#C6E2F8);}
.card.r2{background:linear-gradient(160deg,#E6F8EE,#C2EDD6);}
.card.r3{background:linear-gradient(160deg,#FFF3D6,#FFE09A);}
.card.shiny{background:linear-gradient(160deg,#FFF3D6,#FFDC7E); border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(242,179,43,.6), 0 4px 0 rgba(140,100,10,.3); animation:shinyglow 2s infinite;}
@keyframes shinyglow{50%{box-shadow:0 0 0 3px rgba(242,179,43,.95), 0 4px 0 rgba(140,100,10,.4);}}
.card .cn{font-family:'Baloo 2'; font-size:11px; font-weight:800; line-height:1.15; margin-top:4px;}
.card .cw{font-size:10px; font-weight:800; color:#7B84AD; line-height:1.2;}
.card .badge{position:absolute; top:5px; right:6px; line-height:0;}
.pbrow{background:linear-gradient(180deg,#fff,#EFF3FB); border:2px solid rgba(59,47,94,.45);
  border-radius:12px; padding:9px 11px; display:flex; align-items:center; gap:9px; width:100%;
  box-shadow:0 3px 0 rgba(24,30,66,.14);}
.pbrow .pt{flex:1; text-align:left;}
.pbrow .pn{font-family:'Baloo 2'; font-weight:800; font-size:16px;}
.pbrow .pr{font-size:13px; color:var(--coral); font-weight:800;}
.pbrow .pg{font-size:12px; color:#7B84AD; font-weight:800;}
.speak{background:linear-gradient(180deg,#7FBCF0,var(--blue)); border:none; border-radius:10px;
  padding:8px 9px; cursor:pointer; box-shadow:0 3px 0 #2A6BA8; line-height:0;}
.speak:active{transform:translateY(2px); box-shadow:0 1px 0 #2A6BA8;}
.meter{width:100%; background:#fff; border:2px solid rgba(59,47,94,.5); border-radius:7px;
  height:20px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(24,30,66,.18);}
.meter i{display:block; height:100%; background:linear-gradient(90deg,var(--gold),#F08A2B);
  transition:width .5s; border-radius:5px;}

/* OVERLAYS */
.overlay{position:fixed; inset:0; background:rgba(20,24,52,.55); backdrop-filter:blur(5px);
  z-index:100; display:flex; justify-content:center; padding:16px;
  overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; touch-action:pan-y;}
.omodal{background:linear-gradient(180deg,#FFFFFF,var(--cream)); border:3px solid rgba(59,47,94,.65);
  border-radius:20px; box-shadow:0 16px 40px rgba(8,12,32,.5); padding:24px 20px; max-width:440px;
  width:100%; text-align:center; display:flex; flex-direction:column; gap:13px; align-items:center;
  animation:pop .35s cubic-bezier(.2,1.6,.4,1); margin:auto;}
@keyframes pop{from{transform:scale(.6); opacity:0}}
.omodal h2{margin:0; font-size:25px;}
.omodal p{margin:0; font-weight:800; line-height:1.5;}
.omodal .bigsprite{line-height:0; filter:drop-shadow(0 5px 6px rgba(14,20,48,.3));}
.omodal.alarm{background:linear-gradient(180deg,#F4633A,#D63A2A); color:#fff;
  animation:pop .35s cubic-bezier(.2,1.6,.4,1), alarmflash 1s infinite;}
@keyframes alarmflash{50%{filter:brightness(.9)}}
.countdown{font-family:'Press Start 2P'; font-size:56px; line-height:1.2; text-shadow:0 4px 0 rgba(0,0,0,.12);}
.shake{animation:shakescreen .5s;}
@keyframes shakescreen{0%,100%{transform:translate(0)}20%{transform:translate(-8px,4px)}40%{transform:translate(8px,-4px)}60%{transform:translate(-6px,-4px)}80%{transform:translate(6px,4px)}}
.egg{cursor:pointer; animation:eggwiggle .6s infinite; line-height:0; filter:drop-shadow(0 6px 8px rgba(14,20,48,.35));}
@keyframes eggwiggle{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.confetti{position:fixed; top:-24px; z-index:200; animation:fall linear forwards; pointer-events:none; line-height:0;}
@keyframes fall{to{transform:translateY(112vh) rotate(720deg)}}
.score{font-family:'Press Start 2P'; font-size:44px; line-height:1.3;
  background:linear-gradient(180deg,#5FE0AE,#1E9E68); -webkit-background-clip:text; background-clip:text; color:transparent;}
.hatchspark{position:absolute; line-height:0; animation:hspark 1.2s infinite;}
@keyframes hspark{0%,100%{opacity:.3; transform:scale(.8)}50%{opacity:1; transform:scale(1.2)}}

.langpick{display:flex; flex-direction:column; gap:11px; width:100%;}
.namechips{display:flex; flex-wrap:wrap; gap:8px; justify-content:center;}
.namechip{font-family:'Baloo 2'; font-weight:800; font-size:15px; color:var(--ink);
  background:#fff; border:2px solid rgba(59,47,94,.5); border-radius:10px; padding:9px 14px; cursor:pointer;}
.namechip.sel{background:linear-gradient(180deg,#5FE0AE,var(--mint)); border-color:rgba(14,90,60,.55); color:#0B4A33;}
.kidlist{display:flex; flex-direction:column; gap:7px; width:100%;}
input[type=text]{width:100%; font-family:'Nunito'; font-weight:800; font-size:18px; color:var(--ink);
  border:3px solid rgba(59,47,94,.5); border-radius:12px; padding:13px 17px; background:#fff;
  box-shadow:inset 0 2px 6px rgba(24,30,66,.12); outline:none; user-select:text; -webkit-user-select:text;}
input[type=text]:focus{border-color:var(--blue);}
.gp{font-size:13px; font-weight:800; line-height:1.6; text-align:left; color:var(--ink);
  background:#EFF3FB; border:2px solid rgba(59,47,94,.35); border-radius:12px; padding:12px 14px; width:100%;}
.gp b{color:var(--coral);}
.hidden{display:none !important;}
@media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

/* ================= TRANSLATION MACHINE 3000 — v3 ================= */
const SPR = window.TM_SPRITES, GOLD = window.TM_GOLD;
const RM = matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---------- SPRITE RENDER ---------- */
function sp(name, scale, opts={}){
  let s = SPR[name]; if(!s) return "";
  let shiny = !!opts.shiny;
  if(shiny && SPR[name+"_shiny"]){ name=name+"_shiny"; s=SPR[name]; shiny=false; }
  return `<canvas class="px" width="${s.w}" height="${s.h}" data-sprite="${name}"${shiny?' data-shiny="1"':''} `+
         `style="width:${s.w*scale}px;height:${s.h*scale}px"></canvas>`;
}
function hydrate(root){
  (root||document).querySelectorAll('canvas[data-sprite]:not([data-done])').forEach(cv=>{
    const s = SPR[cv.dataset.sprite]; if(!s) return;
    const ctx = cv.getContext("2d");
    const shiny = cv.dataset.shiny==="1";
    const rows = (cv.dataset.frame==="2" && s.rows2) ? s.rows2 : s.rows;
    ctx.clearRect(0,0,s.w,s.h);
    for(let r=0;r<s.h;r++) for(let c=0;c<s.w;c++){
      const idx = parseInt(rows[r][c],16); if(!idx) continue;
      ctx.fillStyle = (shiny?GOLD[idx]:s.pal[idx]) || "#ff00ff";
      ctx.fillRect(c,r,1,1);
    }
    cv.dataset.done="1";
  });
}

/* ---------- MACHINE FACE ---------- */
let machineMood="idle", machineTimer=null;
function drawMachineFace(){
  const cv = document.getElementById("machineCanvas"); if(!cv) return;
  let name = "machine_"+machineMood;
  if(!SPR[name]) name="machine_idle";
  const s = SPR[name]; const ctx = cv.getContext("2d");
  if(cv.width!==s.w){ cv.width=s.w; cv.height=s.h; }
  ctx.clearRect(0,0,s.w,s.h);
  for(let r=0;r<s.h;r++) for(let c=0;c<s.w;c++){
    const idx = parseInt(s.rows[r][c],16); if(!idx) continue;
    ctx.fillStyle = s.pal[idx]; ctx.fillRect(c,r,1,1);
  }
}
function mood(m){ machineMood=m; drawMachineFace(); }
function startMachineLoop(){
  if(RM){ drawMachineFace(); return; }
  setInterval(()=>{
    if(machineMood==="idle"){
      // occasional blink
      if(Math.random()<0.25){
        const cv=document.getElementById("machineCanvas"); if(!cv)return;
        const s=SPR.machine_blink, ctx=cv.getContext("2d");
        if(cv.width!==s.w){ cv.width=s.w; cv.height=s.h; }
        ctx.clearRect(0,0,s.w,s.h);
        for(let r=0;r<s.h;r++)for(let c=0;c<s.w;c++){const idx=parseInt(s.rows[r][c],16);if(!idx)continue;ctx.fillStyle=s.pal[idx];ctx.fillRect(c,r,1,1);}
        setTimeout(drawMachineFace,160);
      }
    }
  }, 900);
}

/* ---------- SOUND (8-bit WebAudio) ---------- */
let actx=null;
function unlockAudio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended") actx.resume(); }catch(e){} }
window.addEventListener("pointerdown", unlockAudio, {once:false});
function tone(f,dur,type,vol,when){
  if(!S.sound||!actx) return;
  const t=actx.currentTime+(when||0);
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type||"square"; o.frequency.value=f;
  o.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(vol||0.05,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur);
}
function sfx(name){
  if(!S.sound) return; unlockAudio(); if(!actx) return;
  const N={C:523,D:587,E:659,G:784,A:880,C2:1047,E2:1319,G2:1568};
  if(name==="blip") tone(880,0.06,"square",0.04);
  else if(name==="verdict"){ [N.C,N.E,N.G].forEach((f,i)=>tone(f,0.12,"square",0.05,i*0.09)); }
  else if(name==="hatch"){ [N.C,N.E,N.G,N.C2].forEach((f,i)=>tone(f,0.14,"square",0.05,i*0.1)); }
  else if(name==="shiny"){ [N.G,N.C2,N.E2,N.G2,N.E2,N.G2].forEach((f,i)=>tone(f,0.13,"triangle",0.05,i*0.1)); }
  else if(name==="levelup"){ [N.C,N.G,N.C2,N.E2,N.G2].forEach((f,i)=>tone(f,0.13,"square",0.05,i*0.09)); }
  else if(name==="alarm"){ tone(700,0.15,"square",0.06,0); tone(500,0.15,"square",0.06,0.16); tone(700,0.15,"square",0.06,0.32); }
  else if(name==="boss"){ [392,392,466,523].forEach((f,i)=>tone(f,0.16,"sawtooth",0.05,i*0.14)); }
  else if(name==="bonk") tone(160,0.12,"square",0.06);
  else if(name==="chime"){ tone(1047,0.12,"triangle",0.05,0); tone(1319,0.2,"triangle",0.05,0.13); }
}

function migrate(old){
  S.lang = old.lang ?? null;

  S.sound = old.sound ?? true;
  S.world = WORLDS[old.world] ? old.world : "feast"; // pre-world saves land in feast untouched

  S.today = old.today ?? {words:[],creatures:[],quests:0,checks:[]};
  if(!Array.isArray(S.today.checks)) S.today.checks=[]; // pre-review saves
  S.review = (old.review&&typeof old.review==="object"&&!Array.isArray(old.review)) ? old.review : {};
  S.creatures = (old.creatures||[]).map(c=>{
    if(c.sprite) return c; // already v3
    // v2 emoji creature -> deterministic sprite by name hash
    let h=0; const nm=(c.name||"")+ (c.word||"");
    for(let i=0;i<nm.length;i++) h=(h*31+nm.charCodeAt(i))>>>0;
    return { sprite:BASE_CRE[h%BASE_CRE.length], shiny:false, name:c.name||"Mystery Buddy", word:c.word||"?", ts:c.ts||Date.now() };
  });
  // One-time id backfill: pre-backup creatures have no id, and backup import
  // dedupes on id — without this, re-importing your own backup would duplicate
  // every friend. Deterministic hash so the SAME creature in two copies of the
  // same save gets the SAME id.
  S.creatures.forEach(c=>{ if(!c.id) c.id=creatureId(c); });
  S.v=3;
}
function creatureId(c){
  let h=0; const s=(c.name||"")+"|"+(c.word||"")+"|"+(c.ts||0);
  for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0;
  return "cr-"+h.toString(36);
}

/* ---------- REVIEW SCHEDULER (Star Check) ----------
   The honest learning signal lives ONLY in the campfire Star Check — quests
   stay un-scored ritual, and pickWord()'s story order is never touched.
   S.review is keyed "wordId|lang" -> {box, due, seen} (all days as day numbers):
   got-it climbs a 4-box ladder (next due in 1/3/7/14 days), show-again drops
   to box 1 and comes back next session. `seen` = last day the word was
   checked, so re-opening the campfire never re-quizzes the same day. */
const REVIEW_DAYS=[0,1,3,7,14]; // index = box (1..4)
function dayNum(){ return Math.floor((Date.now()-new Date().getTimezoneOffset()*60000)/86400000); }
function reviewKey(wordId,lang){ return wordId+"|"+lang; }
function seedReview(wordId,lang,day){ // called at hatch for a NEW word; never downgrades
  const d=day??dayNum(), k=reviewKey(wordId,lang);
  if(!S.review[k]) S.review[k]={box:1,due:d+REVIEW_DAYS[1],seen:0};
}
function reviewMark(wordId,lang,gotIt,day){
  const d=day??dayNum(), k=reviewKey(wordId,lang);
  const r=S.review[k]||(S.review[k]={box:1,due:d,seen:0});
  r.box = gotIt ? Math.min((r.box||1)+1,REVIEW_DAYS.length-1) : 1;
  r.due = d+REVIEW_DAYS[r.box];
  r.seen = d;
  return r;
}
/* Star Check items: today's new words first (in the language they were learned
   in), then up to `maxDue` due "memory stars" from ANY world, drawn from the
   whole phrasebook. Returns [{w,lang}] — word and language always together. */
function starCheckItems(day,maxDue=3){
  const d=day??dayNum(), out=[], taken={};
  for(const c of (S.today.checks||[])){
    const r=S.review[reviewKey(c.id,c.lang)];
    if(r&&r.seen===d) continue; // already checked today
    const w=S.phrasebook.find(p=>p.id===c.id); if(!w) continue;
    if(taken[reviewKey(c.id,c.lang)]) continue;
    taken[reviewKey(c.id,c.lang)]=1; out.push({w,lang:c.lang});
  }
  const due=[];
  for(const k in (S.review||{})){
    const r=S.review[k]; if(!r||r.due>d||r.seen===d) continue;
    const i=k.lastIndexOf("|"), wordId=k.slice(0,i), lang=k.slice(i+1);
    if(!LANGS[lang]||taken[k]) continue;
    const w=S.phrasebook.find(p=>p.id===wordId); if(!w) continue;
    due.push({w,lang,r});
  }
  due.sort((a,b)=>(a.r.due-b.r.due)||((a.r.seen||0)-(b.r.seen||0)));
  return out.concat(due.slice(0,maxDue).map(x=>({w:x.w,lang:x.lang})));
}

let voices=[];
function loadVoices(){ voices=window.speechSynthesis?speechSynthesis.getVoices():[]; }

// Pick the smoothest available English voice (avoids the flat default robot voice).
// iOS exposes dozens of voices, most of them novelty/robot junk; the ONLY truly
// smooth ones are the "(Enhanced)"/"(Premium)" voices the user downloads in
// Settings > Accessibility > Spoken Content > Voices. Score every voice: big
// boost for enhanced/premium, name-rank bonus for known-natural voices, hard
// penalty for the novelty + Eloquence set. Grown-ups page has a manual picker
// (S.voiceEn) that overrides this auto-pick.
const EN_VOICE_PREFS=["samantha","ava","allison","zoe","joelle","nicky","evan","nathan","noelle",
  "karen","moira","serena","google us english","microsoft aria","microsoft jenny",
  "microsoft zira","fiona","tessa","female"];
const EN_VOICE_JUNK=["albert","bad news","bahh","bells","boing","bubbles","cellos","good news",
  "jester","organ","superstar","trinoids","whisper","wobble","zarvox","junior","kathy","fred",
  "ralph","eddy","flo","grandma","grandpa","reed","rocko","sandy","shelley","eloquence"];
function voiceScore(v){
  const n=((v.name||"")+" "+(v.voiceURI||"")).toLowerCase();
  let s=0;
  if(n.includes("premium")) s+=90;
  if(n.includes("enhanced")) s+=70;
  if(EN_VOICE_JUNK.some(j=>n.includes(j))) s-=200;
  const i=EN_VOICE_PREFS.findIndex(p=>n.includes(p));
  if(i>=0) s+=EN_VOICE_PREFS.length-i;
  if(v.localService) s+=5;
  if(/en[-_]us/i.test(v.lang||"")) s+=4; else if(/en[-_](gb|au)/i.test(v.lang||"")) s+=2;
  return s;
}
function englishVoices(){ // score-sorted, best first
  return voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith("en"))
    .map(v=>({v,score:voiceScore(v)}))
    .sort((a,b)=>b.score-a.score || (a.v.name||"").localeCompare(b.v.name||""));
}
let enVoiceCache=null, enVoiceResolvedFrom=0;
function pickEnglishVoice(){
  if(enVoiceCache && enVoiceResolvedFrom===voices.length) return enVoiceCache;
  const ranked=englishVoices();
  enVoiceCache=ranked.length?ranked[0].v:null; enVoiceResolvedFrom=voices.length;
  return enVoiceCache;
}
function narratorVoice(){ // the grown-ups' manual pick wins; else best auto-pick
  if(S.voiceEn){ const v=voices.find(x=>x.voiceURI===S.voiceEn||x.name===S.voiceEn); if(v) return v; }
  return pickEnglishVoice();
}

function speak(text,lang,opts={}){
  if(!window.speechSynthesis) return;
  try{ speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const isEn = lang==="en" || lang==="en-US";
    if(isEn){
      // Friendly English narrator voice + warmer, less flat delivery.
      const v=narratorVoice();
      if(v) u.voice=v;
      u.lang="en-US";
      u.rate=opts.rate??0.95;      // a touch slower = warmer, clearer for kids
      u.pitch=opts.pitch??1.05;    // near-natural; cranking pitch makes good voices sound toy-ish
    } else {
      // Foreign-language pronunciation: unchanged.
      const v=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(lang));
      if(v) u.voice=v;
      u.lang=lang==="ko"?"ko-KR":lang==="zh"?"zh-CN":"en-US";
      u.rate=opts.rate??0.8; u.pitch=opts.pitch??1;
    }
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- STORAGE SHIM ---------- */
/* Real Safari has no host-provided window.storage bridge (only the QA harness
   and artifact hosts do). Without this, saves silently vanish on the iPad. */
if(!window.storage){
  window.storage={
    get:async k=>{ try{ const v=localStorage.getItem(k); return v==null?null:{value:v}; }catch(e){ return null; } },
    set:async(k,v)=>{ try{ localStorage.setItem(k,v); }catch(e){} return {value:v}; },
    delete:async k=>{ try{ localStorage.removeItem(k); }catch(e){} },
    list:async()=>{ try{ return {keys:Object.keys(localStorage)}; }catch(e){ return {keys:[]}; } }
  };
}

/* ---------- STORAGE PERSISTENCE ---------- */
/* Safari evicts IndexedDB (and localStorage) after ~7 days without a visit
   unless the origin holds persistent storage. persist() never shows a prompt
   on Safari — it grants or denies silently — so we just ask and remember the
   answer; the booth durability warning stays truthful either way. */
let storagePersisted=false;
async function requestPersist(){
  try{
    if(navigator.storage&&navigator.storage.persist){
      storagePersisted=await navigator.storage.persisted();
      if(!storagePersisted) storagePersisted=await navigator.storage.persist();
    }
  }catch(e){}
}

/* ---------- BACKUP EXPORT / IMPORT ---------- */
/* Full family archive: save state + EVERY voice recording (base64) in one
   JSON file. Import is merge-only — newest recording per word wins, nothing
   is ever deleted, and a file either validates whole or is rejected whole. */
function blobToB64(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{ const s=String(r.result||""); res(s.slice(s.indexOf(",")+1)); };
    r.onerror=()=>rej(r.error||new Error("read-failed"));
    r.readAsDataURL(blob);
  });
}
function b64ToBlob(b64,mime){
  const bin=atob(b64); const u=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i);
  return new Blob([u],{type:mime||"audio/mp4"});
}
async function backupPayload(){
  const clips=[];
  for(const r of await TM_AUDIO.dump()){
    try{ clips.push({id:r.id,wordId:r.wordId,lang:r.lang,speaker:r.speaker||"anon",mime:r.mime||"",ts:r.ts||0,b64:await blobToB64(r.blob)}); }
    catch(e){} // one unreadable blob shouldn't sink the whole backup
  }
  return JSON.stringify({app:"tm3000-backup",version:2,exportedAt:new Date().toISOString(),save:S,clips});
}
/* Pure validator: returns {ok:true,data,counts} or {ok:false,why}. Rejects a
   bad file WHOLE — no partial imports. Accepts v1 (step-zero, no clips). */
function validateBackup(raw){
  let p; try{ p=JSON.parse(raw); }catch(e){ return {ok:false,why:"that file isn't readable as a backup (not JSON)"}; }
  if(!p||typeof p!=="object"||p.app!=="tm3000-backup") return {ok:false,why:"that's not a Translation Machine backup file"};
  if(p.version!==1&&p.version!==2) return {ok:false,why:"backup version "+p.version+" is newer than this game — update the game first"};
  const s=p.save;
  if(!s||typeof s!=="object") return {ok:false,why:"the backup is missing its save data"};
  if(s.creatures!=null&&!Array.isArray(s.creatures)) return {ok:false,why:"the friends list in this backup is damaged"};
  if(s.phrasebook!=null&&!Array.isArray(s.phrasebook)) return {ok:false,why:"the phrasebook in this backup is damaged"};
  if(s.review!=null&&(typeof s.review!=="object"||Array.isArray(s.review))) return {ok:false,why:"the star-check progress in this backup is damaged"};
  const clips=p.clips==null?[]:p.clips;
  if(!Array.isArray(clips)) return {ok:false,why:"the recordings in this backup are damaged"};
  for(const c of clips){
    if(!c||typeof c.id!=="string"||typeof c.wordId!=="string"||typeof c.lang!=="string"||typeof c.b64!=="string"||typeof c.ts!=="number")
      return {ok:false,why:"a recording entry in this backup is damaged"};
    try{ c.blob=b64ToBlob(c.b64,c.mime); }catch(e){ return {ok:false,why:"a recording in this backup can't be decoded"}; }
  }
  return {ok:true,data:p,counts:{creatures:(s.creatures||[]).length,phrases:(s.phrasebook||[]).length,clips:clips.length}};
}
/* Merge a VALIDATED backup in. Collections union by id, counters take the max,
   this device's settings (language, sound, names, couch) stay as they are,
   clips: newest ts per word+lang+speaker wins. Nothing is ever deleted. */
async function importBackup(p){
  const added={creatures:0,phrases:0,clips:0,updated:0};
  const inS=p.save||{};
  (inS.creatures||[]).forEach(c=>{
    if(!c||!c.sprite) return;
    if(!c.id) c.id=creatureId(c);
    if(!S.creatures.some(x=>x.id===c.id)){ S.creatures.push(c); added.creatures++; }
  });
  (inS.phrasebook||[]).forEach(pb=>{
    if(!pb||!pb.id) return;
    if(!S.phrasebook.some(x=>x.id===pb.id)){ S.phrasebook.push(pb); added.phrases++; }
  });
  (inS.usedWords||[]).forEach(w=>{ if(!S.usedWords.includes(w)) S.usedWords.push(w); });
  (inS.ttShown||[]).forEach(t=>{ if(!S.ttShown.includes(t)) S.ttShown.push(t); });
  S.missionsDone=Math.max(S.missionsDone,inS.missionsDone||0);
  // star-check progress: union by word|lang, most recently checked entry wins
  const inRev=(inS.review&&typeof inS.review==="object"&&!Array.isArray(inS.review))?inS.review:{};
  if(!S.review) S.review={};
  for(const k in inRev){
    const b=inRev[k]; if(!b||typeof b!=="object") continue;
    const a=S.review[k];
    if(!a||(b.seen||0)>(a.seen||0)) S.review[k]={box:b.box||1,due:b.due||0,seen:b.seen||0};
  }
  const have=await TM_AUDIO.dump();
  for(const c of (p.clips||[])){
    const cur=have.find(h=>h.id===c.id);
    if(cur&&(cur.ts||0)>=c.ts) continue; // ours is same or newer — keep it
    await TM_AUDIO.putRaw({id:c.id,wl:c.wordId+"|"+c.lang,wordId:c.wordId,lang:c.lang,speaker:c.speaker||"anon",blob:c.blob,mime:c.mime||"",ts:c.ts});
    if(cur) added.updated++; else added.clips++;
  }
  await saveState(); updateHeader();
  return added;
}

async function exportBackup(msgEl){
  const say=t=>{ if(msgEl){ msgEl.innerHTML="<b>Backup:</b> "+t; } };
  const d=new Date(), pad=n=>String(n).padStart(2,"0");
  const name=`tm3000-backup-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  try{
    say("packing up recordings…");
    // NOTE: this await spends some of the tap's transient activation; if iOS
    // decides too much time passed, share() throws and we fall to download.
    const blob=new Blob([await backupPayload()],{type:"application/json"});
    // share sheet first (AirDrop / Save to Files); must run inside the tap
    if(navigator.canShare&&navigator.share){
      let file=null;
      try{ file=new File([blob],name,{type:"application/json"}); }catch(e){}
      if(file&&navigator.canShare({files:[file]})){
        try{ await navigator.share({files:[file],title:"TM3000 backup"});
          say("sent! If a file arrived where you shared it, the test worked."); return;
        }catch(e){ if(e&&e.name==="AbortError"){ say("share canceled — nothing was sent."); return; } }
      }
    }
    // fallback: plain download link
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>{ try{URL.revokeObjectURL(url);}catch(e){} },4000);
    say(`downloaded <b>${name}</b> — on the iPad it lands in Files &gt; Downloads.`);
  }catch(e){ say("export failed ("+esc(String((e&&e.message)||e))+")."); }
}

/* ---------- RECORDED VOICES (the family IS the audio engine) ---------- */
/* Clips live in IndexedDB (localStorage is too small for audio), keyed
   word|lang|speaker. Playback picks the most recent clip for a word+lang.
   If IndexedDB is unavailable, clips fall back to an in-memory store that
   lasts for the session — the booth warns when that happens. */
const TM_AUDIO=(()=>{
  let db=null, dbFailed=false, player=null;
  const mem=new Map(), urlCache=new Map();
  function open(){
    return new Promise(res=>{
      if(db) return res(db);
      if(dbFailed||!window.indexedDB) return res(null);
      try{
        const rq=indexedDB.open("tm3000-audio",1);
        rq.onupgradeneeded=()=>{ const d=rq.result;
          if(!d.objectStoreNames.contains("clips")){
            const st=d.createObjectStore("clips",{keyPath:"id"});
            st.createIndex("byWordLang","wl");
          } };
        rq.onsuccess=()=>{ db=rq.result; res(db); };
        rq.onerror=()=>{ dbFailed=true; res(null); };
      }catch(e){ dbFailed=true; res(null); }
    });
  }
  const keyId=(w,l,s)=>w+"|"+l+"|"+(s||"anon");
  async function save(wordId,lang,speaker,blob){
    const rec={id:keyId(wordId,lang,speaker),wl:wordId+"|"+lang,wordId,lang,
               speaker:speaker||"anon",blob,mime:blob.type||"",ts:Date.now()};
    const old=urlCache.get(rec.id); if(old){ try{URL.revokeObjectURL(old);}catch(e){} urlCache.delete(rec.id); }
    const d=await open();
    if(d){ try{
      await new Promise((res,rej)=>{ const t=d.transaction("clips","readwrite");
        t.objectStore("clips").put(rec); t.oncomplete=res; t.onerror=()=>rej(t.error); });
      return true;
    }catch(e){} }
    mem.set(rec.id,rec); return false; // saved, but not durable
  }
  async function allFor(wordId,lang){
    const wl=wordId+"|"+lang, out=[];
    const d=await open();
    if(d){ try{
      const recs=await new Promise((res,rej)=>{ const rq=d.transaction("clips").objectStore("clips").index("byWordLang").getAll(wl);
        rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); });
      out.push(...recs);
    }catch(e){} }
    mem.forEach(r=>{ if(r.wl===wl) out.push(r); });
    return out;
  }
  async function latest(wordId,lang){
    const recs=await allFor(wordId,lang);
    if(!recs.length) return null;
    recs.sort((a,b)=>b.ts-a.ts); return recs[0]; // most-recent-wins
  }
  async function play(wordId,lang){
    const rec=await latest(wordId,lang); if(!rec) return false;
    let url=urlCache.get(rec.id);
    if(!url){ try{ url=URL.createObjectURL(rec.blob); }catch(e){ return false; } urlCache.set(rec.id,url); }
    try{ if(player) player.pause();
      player=new Audio(url); await player.play(); return true;
    }catch(e){ return false; }
  }
  async function counts(lang){ // set of wordIds that have >=1 clip in lang
    const ids=new Set();
    const d=await open();
    if(d){ try{
      const recs=await new Promise((res,rej)=>{ const rq=d.transaction("clips").objectStore("clips").getAll();
        rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); });
      recs.forEach(r=>{ if(r.lang===lang) ids.add(r.wordId); });
    }catch(e){} }
    mem.forEach(r=>{ if(r.lang===lang) ids.add(r.wordId); });
    return ids;
  }
  async function dump(){ // every clip record (db + mem), for backup export
    const out=[];
    const d=await open();
    if(d){ try{
      const recs=await new Promise((res,rej)=>{ const rq=d.transaction("clips").objectStore("clips").getAll();
        rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); });
      out.push(...recs);
    }catch(e){} }
    mem.forEach(r=>{ if(!out.some(o=>o.id===r.id)) out.push(r); });
    return out;
  }
  async function putRaw(rec){ // import path: keeps the original ts/speaker (save() would restamp ts)
    const old=urlCache.get(rec.id); if(old){ try{URL.revokeObjectURL(old);}catch(e){} urlCache.delete(rec.id); }
    const d=await open();
    if(d){ try{
      await new Promise((res,rej)=>{ const t=d.transaction("clips","readwrite");
        t.objectStore("clips").put(rec); t.oncomplete=res; t.onerror=()=>rej(t.error); });
      return true;
    }catch(e){} }
    mem.set(rec.id,rec); return false;
  }
  function durable(){ return !dbFailed && !!window.indexedDB; }
  return {save,latest,play,counts,durable,dump,putRaw};
})();
window.TM_AUDIO=TM_AUDIO; // exposed so the QA harness can seed clips

const TM_REC=(()=>{
  let mr=null, chunks=[], stream=null;
  function pickMime(){
    // iOS Safari records AAC in an mp4 container, not webm — feature-detect.
    for(const m of ["audio/mp4","audio/webm;codecs=opus","audio/webm"]){
      try{ if(MediaRecorder.isTypeSupported(m)) return m; }catch(e){}
    }
    return "";
  }
  const supported=()=> !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.MediaRecorder);
  async function start(){
    if(!supported()) throw new Error("no-recorder");
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const m=pickMime(); chunks=[];
    mr=new MediaRecorder(stream, m?{mimeType:m}:undefined);
    mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
    mr.start();
  }
  function stop(){
    return new Promise((res,rej)=>{
      if(!mr) return rej(new Error("not-recording"));
      mr.onstop=()=>{
        const type=(mr&&mr.mimeType)||(chunks[0]&&chunks[0].type)||"audio/mp4";
        const blob=new Blob(chunks,{type});
        if(stream) stream.getTracks().forEach(t=>t.stop());
        mr=null; stream=null; chunks=[]; res(blob);
      };
      try{ mr.stop(); }catch(e){ rej(e); }
    });
  }
  function cancel(){ try{ if(mr) mr.stop(); }catch(e){} if(stream) stream.getTracks().forEach(t=>t.stop()); mr=null; stream=null; chunks=[]; }
  const recording=()=> !!mr;
  return {supported,start,stop,cancel,recording};
})();

/* Word pronunciation: recorded family voice first, TTS second. The family's
   Chinese target is Mandarin (2026-07 pivot), so zh now mirrors ko —
   grandparent clip wins when one exists, zh-CN TTS covers the rest. The old
   think-face + chime "machine can't say this one" path is retired. */
async function speakWord(w, langKey, opts={}){
  if(await TM_AUDIO.play(w.id, langKey)) return true;
  if(langKey==="ko"){ speak(w.ko,"ko",opts); return true; }
  if(langKey==="zh"){ speak(w.zh,"zh",opts); return true; }
  return false;
}

function pickWord(){
  // Sequential, not random: each bank is in story order, so the session
  // walks the arc. S.usedWords stays one flat list across worlds; filter and
  // reset only the ACTIVE world's ids so switching never resets the other.
  const bank=world().words;
  let pool=bank.filter(w=>!S.usedWords.includes(w.id));
  if(!pool.length){
    const ids=bank.map(w=>w.id);
    S.usedWords=S.usedWords.filter(id=>!ids.includes(id));
    pool=bank;
  }
  const w=pool[0]; S.usedWords.push(w.id); saveState(); return w;
}
function pickMission(){
  // ~40% judge-flow
  const M=world().missions;

function showTeacherGrid(){

  // appeared. S.ttShown stays one flat list across worlds — reset only the

  const bank=world().words;

/* Hold-to-finish */
function setupHold(onDone){
  const btn=$("#holdBtn"), fill=$("#holdFill"); let raf=null,start=null;
  function begin(e){ e.preventDefault(); mood("think"); start=performance.now();
    btn.querySelector(".holdlabel").innerHTML=sp("ic_mic",3)+" LISTENING...";
    (function step(t){ const p=Math.min((t-start)/2200,1); fill.style.width=(p*100)+"%";
      if(p>=1){ raf=null; start=null; btn.removeEventListener("pointerdown",begin); onDone(); return; }
      raf=requestAnimationFrame(step); })(performance.now());
  }
  function cancel(){ if(start===null)return; if(raf)cancelAnimationFrame(raf); start=null; fill.style.width="0%"; mood("idle");
    btn.querySelector(".holdlabel").innerHTML=sp("ic_mic",3)+" HOLD & SAY IT!"; }
  btn.addEventListener("pointerdown",begin);
  btn.addEventListener("pointerup",cancel);
  btn.addEventListener("pointerleave",cancel);
}

  if(pendingChaosMods.opposite){
    currentScreen="verdict";

function showEgg(boss){
  currentScreen="hatch";

    <h2>TAP TO HATCH!</h2>
    <div class="egg" id="egg">${sp("ic_egg",8)}</div>

  let taps=0;
  $("#egg").onclick=function(){ taps++; sfx("blip");

async function hatchCreature(boss){
  const w=currentMission.w;
  const spriteName = boss ? rand(BOSS_CRE) : rand(BASE_CRE);
  const shiny = Math.random() < (boss?0.34:0.125);
  const creature={ id:newCreatureId(), sprite:spriteName, shiny, name:rand(ADJ)+" "+rand(NOUN), word:w.en, ts:Date.now() };
  S.creatures.push(creature); S.missionsDone++;
  S.today.quests++; S.today.creatures.push(creature);
  if(!S.phrasebook.some(p=>p.id===w.id)){
    const entry={id:w.id,en:w.en,sp:w.sp,ko:w.ko,kr:w.kr,zh:w.zh,zp:w.zp};
    S.phrasebook.push(entry);
    if(!S.today.words.some(x=>x.id===w.id)) S.today.words.push(entry);
    // enter the review loop in the language this quest was played in
    seedReview(w.id,currentMission.langKey);
    if(!S.today.checks) S.today.checks=[];
    if(!S.today.checks.some(c=>c.id===w.id&&c.lang===currentMission.langKey))
      S.today.checks.push({id:w.id,lang:currentMission.langKey});
  }
  const leveledUp = (S.creatures.length%3===0);
  await saveState(); updateHeader();
  confetti(shiny?90:60); sfx(shiny?"shiny":"hatch");
  const sparkHTML = shiny ? `<div class="hatchspark" style="top:10px;left:24px">${sp("ic_sparkle",3)}</div><div class="hatchspark" style="top:20px;right:24px">${sp("ic_star",3)}</div>` : "";
  overlay(`
    <div class="tag">${shiny?(sp("ic_star",2)+" SHINY "+sp("ic_star",2)):"NEW FRIEND"}</div>
    ${sparkHTML}
    <div class="bigsprite">${sp(spriteName,7,{shiny})}</div>
    <h2>${esc(creature.name)}${shiny?"!":"!"}</h2>
    <p>joined your family collection!<br>New word saved: <b>${esc(w.en)}</b></p>
    ${leveledUp?`<div class="tag">${sp("ic_gem",3)} MACHINE LEVELED UP!</div>`:""}
    <button class="btn mint" id="nextM">${sp("ic_map",3)} NEXT QUEST!</button>
    <button class="btn small sky" id="doneM">We're done for now</button>
  `);
  if(leveledUp) sfx("levelup");
  $("#nextM").onclick=()=>{ closeOverlay(); startMission(); };
  $("#doneM").onclick=()=>{ closeOverlay(); renderCampfire(); };
}

/* ================= CHAOS ================= */
function runChaos(c, onDone){
  mood("dizzy");
  const useCouch = S.couch && c.couchTxt;
  const txt = useCouch ? c.couchTxt : c.txt;
  if(c.countdown){
    overlay(`<div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${txt}</p><div class="countdown pixel" id="cd">${c.countdown}</div>`, c.alarm);
    sfx("alarm"); if(c.say) speak(c.say,"en",{rate:1.05,pitch:c.id==="freeze"?0.6:1.3});
    let n=c.countdown;
    const iv=setInterval(()=>{ n--; const cd=document.getElementById("cd"); if(cd)cd.textContent=n;
      if(n<=0){ clearInterval(iv); closeOverlay(); confetti(30); onDone(); } },1000);
  } else if(c.sneeze){
    overlay(`<div class="bigsprite">${sp("machine_dizzy",7)}</div><h2>${c.t}</h2><p>${txt}</p>`);
    setTimeout(()=>{ document.body.classList.add("shake"); speak("Ahh... ahh... CHOO!","en",{rate:0.9,pitch:0.7}); sfx("bonk");
      overlay(`<div class="bigsprite">${sp("machine_dizzy",7)}</div><h2>AAACHOO!!</h2><p>The machine sneezed words EVERYWHERE!</p><button class="btn mint" id="bless">Say "BLESS YOU!"</button>`);
      confetti(60); setTimeout(()=>document.body.classList.remove("shake"),600);
      $("#bless").onclick=()=>{ closeOverlay(); onDone(); };
    },1500);
  } else if(c.robot){
    const L=currentMission?currentMission.L:LANGS[sessionLangKey()];
    const w=currentMission?currentMission.w:rand(ALL_WORDS);
    overlay(`<div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${txt}</p><button class="btn sky" id="sing">${sp("ic_music",3)} START THE SONG</button>`);
    $("#sing").onclick=()=>{ speak(L.native(w)+"... "+L.native(w)+"... "+L.native(w), L.code, {rate:0.5,pitch:0.4});
      $("#sing").outerHTML=`<button class="btn mint" id="sung">WE SANG IT!</button>`;
      $("#sung").onclick=()=>{ closeOverlay(); onDone(); }; };
  } else if(c.opposite){
    pendingChaosMods.opposite=true;
    overlay(`<div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${txt}</p><button class="btn gold" id="ok">UH OH...</button>`);
    $("#ok").onclick=()=>{ closeOverlay(); onDone(); };
  } else { /* pirate */
    pendingChaosMods.pirate=true;
    overlay(`<div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${txt}</p><button class="btn sky" id="ok">ARRR, FINE!</button>`);
    $("#ok").onclick=()=>{ closeOverlay(); onDone(); };
  }
}

/* ---------- CHAOS FUSE (delayed, secret) ---------- */
function armChaosFuse(){
  if(fuseArmedCount>=2) return;
  fuseArmedCount++;
  const delay=15000+Math.random()*45000;
  const timer=setTimeout(()=>{ fuseArmedCount=Math.max(0,fuseArmedCount-1); tryFireFuse(); }, delay);
  fuseTimers.push(timer);
}
function tryFireFuse(){
  // only interrupt safe screens; otherwise wait
  const safe = !busy() && ["questcard","home","practice","collection"].includes(currentScreen);
  if(!safe){ setTimeout(tryFireFuse, 1500); return; }
  const pool=CHAOS.filter(c=>!c.verdictOnly);
  const c=rand(pool);
  const resume=makeResume();
  overlay(`<div class="tag">${sp("ic_bell",3)} RANDOM CHAOS STRIKE!</div><div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${(S.couch&&c.couchTxt)?c.couchTxt:c.txt}</p><button class="btn coral" id="go">LET'S GO!</button>`);
  $("#go").onclick=()=>{ closeOverlay(); runChaos(c, resume); };
}
function makeResume(){
  const screen=currentScreen;
  if(screen==="questcard" && currentMission){ return ()=> currentMission.boss ? renderMissionHome() : showQuestCard(); }
  if(screen==="practice") return ()=>renderPractice();
  if(screen==="collection") return ()=>renderCollection();
  return ()=>renderMissionHome();
}

/* ================= CAMPFIRE RECAP ================= */
/* Star Check: the game's ONLY honest review moment. One card per word — the
   kid says it out loud, a grown-up taps one of two BIG sprite buttons
   (star = got it, egg = still hatching). Sprite-first + >=88px targets so a
   grandparent who can't read the screen can still judge. No fail state, no
   score — "play it again" just means the word visits another campfire. */
function renderStarCheck(items,i){
  currentScreen="home";
  if(!items.length||i>=items.length){ renderCampfire(); return; }
  mood(i===0?"think":"idle");
  const it=items[i], L=LANGS[it.lang], w=it.w;
  render(`
    <div class="tag">STAR CHECK ${sp("ic_star",2)} ${i+1} of ${items.length}</div>
    <div class="bigsprite">${sp(w.sp||"star_sprite",6)}</div>
    <h2>${esc(w.en).toUpperCase()}</h2>
    <p>Can you still say it in <b>${L.name}</b>? Say it OUT LOUD to the campfire... then the judge taps!</p>
    <button class="btn small sky" id="scHear">${sp("ic_speaker",3)} Hear it first</button>
    <div style="display:flex;gap:10px;width:100%">
      <button class="btn gold" id="scGot" style="flex:1;min-height:96px">${sp("ic_star",5)}<br>GOT IT!</button>
      <button class="btn sky" id="scAgain" style="flex:1;min-height:96px">${sp("ic_egg",5)}<br>STILL HATCHING</button>
    </div>
    <button class="btn small muted" id="scSkip">Skip to the campfire</button>
  `);
  $("#scHear").onclick=()=>speakWord(w,it.lang);
  $("#scGot").onclick=async()=>{ reviewMark(w.id,it.lang,true); await saveState(); confetti(25); sfx("hatch"); renderStarCheck(items,i+1); };
  $("#scAgain").onclick=async()=>{ reviewMark(w.id,it.lang,false); await saveState(); sfx("blip"); renderStarCheck(items,i+1); };
  $("#scSkip").onclick=()=>renderCampfire();
}
function renderCampfire(){

let flickerIv=null;
function flickerCampfire(){
  if(RM) return; if(flickerIv) clearInterval(flickerIv);
  flickerIv=setInterval(()=>{
    const cv=stage().querySelector('canvas[data-sprite="campfire"]'); if(!cv){ clearInterval(flickerIv); return; }
    const s=SPR.campfire, rows=(cv.dataset.frame==="2")?s.rows:s.rows2;
    cv.dataset.frame=(cv.dataset.frame==="2")?"1":"2";
    const ctx=cv.getContext("2d"); ctx.clearRect(0,0,s.w,s.h);
    for(let r=0;r<s.h;r++)for(let c=0;c<s.w;c++){const idx=parseInt(rows[r][c],16);if(!idx)continue;ctx.fillStyle=s.pal[idx];ctx.fillRect(c,r,1,1);}
  },380);
}

  });
  const addKid=()=>{ const v=$("#kidInput").value.trim(); if(v&&setupSel.kids.length<4){ setupSel.kids.push(v); $("#kidInput").value=""; drawKids(); sfx("blip"); } };
  $("#kidInput").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); addKid(); } });
  $("#startPlay").onclick=async()=>{ S.players={kids:setupSel.kids,judges:setupSel.judges}; await saveState(); updateHeader(); closeOverlay(); confetti(30); renderMissionHome(); };
  $("#skipNames").onclick=async()=>{ S.players={kids:setupSel.kids,judges:setupSel.judges}; await saveState(); updateHeader(); closeOverlay(); renderMissionHome(); };
}

/* ================= VOICE BOOTH ================= */
/* Elder-first recording flow: huge targets, the native word front and center,
   near-zero English. A grown-up drives; the grandparent just talks. */
let boothLang=null, boothSpeaker=null, boothIdx=0, boothRec=false, boothHave=new Set(), boothNewClips=0;
function boothSpeakers(){
  const base = boothLang==="ko"?["Halmoni","Harabeoji"]:["Nai Nai","Ye Ye"];
  const extra = (S.players.judges||[]).filter(j=>!base.includes(j)&&j!=="Grandma"&&j!=="Grandpa");
  return [...base,...extra,"Grandma","Grandpa"].filter((v,i,a)=>a.indexOf(v)===i);
}
async function showVoiceBooth(){
  closeOverlay();
  if(TM_REC.recording()) TM_REC.cancel();
  currentScreen="booth"; mood("happy");
  if(!TM_REC.supported()){
    render(`
      <div class="tag">VOICE BOOTH</div>
      <div class="bigsprite">${sp("machine_dizzy",7)}</div>
      <h2>NO MICROPHONE HERE</h2>
      <p>This browser can't record audio. Open the game in Safari on the iPad and try again!</p>
      <button class="btn mint" id="bBack">${sp("ic_map",3)} BACK TO QUESTS</button>
    `);
    $("#bBack").onclick=()=>{ renderTabs("missions"); renderMissionHome(); };
    return;
  }
  if(!boothLang) boothLang = (S.lang==="ko"||S.lang==="zh") ? S.lang : "ko";
  boothHave=await TM_AUDIO.counts(boothLang);
  boothIdx=0; boothRec=false; boothNewClips=0;
  renderBoothWord();
}
async function boothSetLang(l){
  if(boothRec) return;
  boothLang=l; boothSpeaker=null;
  boothHave=await TM_AUDIO.counts(boothLang);
  renderBoothWord();
}
function renderBoothWord(){
  currentScreen="booth";
  // Booth covers BOTH word banks (30 words) so grandparents can record the
  // parade words too; the gloss shows which world each word belongs to.
  const w=ALL_WORDS[boothIdx], L=LANGS[boothLang];
  const wl=FEAST_WORDS.includes(w)?"FEAST":"PARADE";
  const done=boothHave.has(w.id);
  const spk=boothSpeaker||boothSpeakers()[0];
  render(`
    <div class="tag">VOICE BOOTH</div>
    <div class="btnrow">
      <button class="langchip" id="bKo" style="${boothLang==="ko"?"background:linear-gradient(180deg,#FFE9A8,var(--gold))":""}">Korean</button>
      <button class="langchip" id="bZh" style="${boothLang==="zh"?"background:linear-gradient(180deg,#FFE9A8,var(--gold))":""}">Chinese</button>
    </div>
    <div class="namechips">${boothSpeakers().map(n=>`<button class="namechip ${spk===n?'sel':''}" data-n="${esc(n)}">${esc(n)}</button>`).join("")}</div>
    <div class="bigsprite">${sp(w.sp,6)}</div>
    <div class="native">${L.native(w)}</div>
    <div class="gloss">${wl} &bull; ${esc(w.en)} &bull; ${boothIdx+1}/${ALL_WORDS.length} ${done?sp("ic_star",2):""}</div>
    <button class="btn huge ${boothRec?"":"gold"}" id="bRec">${sp("ic_mic",4)} ${boothRec?"TAP WHEN DONE!":"TAP, THEN SAY IT!"}</button>
    <div class="btnrow">
      <button class="btn small sky" id="bPrev">&larr;</button>
      ${done&&!boothRec?`<button class="btn small mint" id="bPlay">${sp("ic_speaker",3)}</button>`:""}
      <button class="btn small sky" id="bNext">&rarr;</button>
    </div>
    ${TM_AUDIO.durable()
      ? (storagePersisted?"":`<p class="gloss">heads up: Safari may clear recordings if the game sits unopened for a week — play a little each week to keep them safe</p>`)
      : `<p class="gloss">heads up: this device won't keep recordings after closing</p>`}
    <button class="btn small muted" id="bExit">BACK TO MENU</button>
  `);
  $("#bKo").onclick=()=>boothSetLang("ko");
  $("#bZh").onclick=()=>boothSetLang("zh");
  stage().querySelectorAll(".namechip").forEach(b=>b.onclick=()=>{ if(boothRec) return; boothSpeaker=b.dataset.n; renderBoothWord(); });
  const step=d=>{ if(boothRec) return; boothIdx=(boothIdx+d+ALL_WORDS.length)%ALL_WORDS.length; sfx("blip"); renderBoothWord(); };
  $("#bPrev").onclick=()=>step(-1);
  $("#bNext").onclick=()=>step(1);
  const play=$("#bPlay"); if(play) play.onclick=()=>TM_AUDIO.play(w.id,boothLang);
  $("#bExit").onclick=()=>{ if(boothNewClips>0) boothBackupNudge(); else goHome(); };
  $("#bRec").onclick=async()=>{
    if(boothRec){
      try{
        const blob=await TM_REC.stop();
        boothRec=false;
        await TM_AUDIO.save(w.id,boothLang,spk,blob);
        boothHave.add(w.id); boothNewClips++;
        sfx("verdict"); confetti(15);
        renderBoothWord();
        TM_AUDIO.play(w.id,boothLang); // instant replay: verification + delight
      }catch(e){ boothRec=false; renderBoothWord(); }
    } else {
      // Instant feedback BEFORE the await: proves the tap registered even if
      // the mic request hangs (iOS can leave getUserMedia pending forever
      // when the permission popup is suppressed).
      const b=$("#bRec"); b.textContent="ALLOW MICROPHONE..."; b.disabled=true;
      try{
        await Promise.race([ TM_REC.start(),
          new Promise((_,rej)=>setTimeout(()=>rej(new Error("mic-timeout")),12000)) ]);
        boothRec=true; mood("think"); sfx("blip"); renderBoothWord();
      }
      catch(e){ TM_REC.cancel(); boothMicError(e); }
    }
  };
}
/* Post-booth nudge: fresh recordings are exactly the thing Safari can evict
   (persist() was denied on the family iPad) — offer a backup on the way out. */
function boothBackupNudge(){
  const n=boothNewClips; boothNewClips=0;
  overlay(`
    <div class="tag">NICE RECORDING!</div>
    <div class="bigsprite">${sp("machine_happy",6)}</div>
    <h2>${n} NEW RECORDING${n===1?"":"S"} SAVED</h2>
    <p>Recordings are the one thing that's hard to redo — back them up now so Safari can never lose them?</p>
    <div class="gp" id="nudgeMsg"><b>Backup:</b> one file with everything, AirDrop it anywhere safe.</div>
    <button class="btn gold" id="nudgeBackup">${sp("ic_gem",3)} BACKUP NOW</button>
    <button class="btn small muted" id="nudgeLater">LATER</button>
  `);
  $("#nudgeBackup").onclick=()=>exportBackup($("#nudgeMsg"));
  $("#nudgeLater").onclick=()=>goHome();
}
function boothMicError(e){
  mood("dizzy");
  const name=(e&&(e.name||e.message))||"unknown";
  const hint =
    name==="mic-timeout" ? "Safari never showed the microphone popup. In the address bar tap <b>aA</b> &gt; Website Settings &gt; set Microphone to <b>Ask</b> or <b>Allow</b>. Also check Settings &gt; Safari &gt; Microphone." :
    (name==="NotAllowedError"||name==="SecurityError") ? "The microphone is blocked for this website. Tap <b>aA</b> in the address bar &gt; Website Settings &gt; Microphone &gt; <b>Allow</b>, then try again." :
    name==="NotFoundError" ? "Safari can't find a microphone on this device." :
    "Check Settings &gt; Safari &gt; Microphone, then try again.";
  render(`
    <div class="tag">VOICE BOOTH</div>
    <div class="bigsprite">${sp("machine_dizzy",7)}</div>
    <h2>MICROPHONE IS SHY</h2>
    <p>${hint}</p>
    <p class="gloss">(reason: ${esc(String(name))})</p>
    <button class="btn gold" id="bRetry">TRY AGAIN</button>
    <button class="btn small muted" id="bBack">BACK TO MENU</button>
  `);
  $("#bRetry").onclick=()=>renderBoothWord();
  $("#bBack").onclick=()=>goHome();
}

/* ================= GROWN-UPS PAGE (secret) ================= */
function setupGrownupsGesture(){
  const title=$("#machineTitle"); let timer=null;
  const start=e=>{ timer=setTimeout(showGrownups,1500); };
  const clear=()=>{ if(timer){clearTimeout(timer);timer=null;} };
  title.addEventListener("pointerdown",start);
  title.addEventListener("pointerup",clear);
  title.addEventListener("pointerleave",clear);
}
/* The visible front door: crown button in the header. One tap, then one
   giant hold-to-open button with a fill bar — nothing to memorize, so a
   grandparent only needs to be told "tap the crown, hold the big button".
   Pointer capture keeps a shaky finger from cancelling the hold by drifting
   off the button; only lifting the finger cancels. The old long-press on
   the title still works as a shortcut. */
function showGrownupsGate(){
  overlay(`
    <div class="tag">FOR GROWN-UPS ONLY</div>
    <div class="bigsprite">${sp("ic_crown",6)}</div>
    <h2>GROWN-UPS' DOOR</h2>
    <p>Press the big button and <b>keep your finger on it</b> until the door opens.</p>
    <button class="btn holdbtn" id="gpGateBtn"><div class="holdfill" id="gpGateFill"></div>
      <span class="holdlabel">${sp("ic_crown",3)} HOLD TO OPEN</span></button>
    <button class="btn small muted" id="gpGateBack">BACK TO THE GAME</button>
  `);
  const btn=$("#gpGateBtn"), fill=$("#gpGateFill"); let raf=null,start=null;
  const label=t=>{ const l=btn.querySelector(".holdlabel"); l.innerHTML=sp("ic_crown",3)+" "+t; hydrate(l); };
  function begin(e){ e.preventDefault();
    try{ btn.setPointerCapture(e.pointerId); }catch(_){}
    start=performance.now(); label("KEEP HOLDING...");
    (function step(t){ const p=Math.min((t-start)/1200,1); fill.style.width=(p*100)+"%";
      if(p>=1){ raf=null; start=null; sfx("chime"); showGrownups(); return; }
      raf=requestAnimationFrame(step); })(performance.now());
  }
  function cancel(){ if(start===null)return; if(raf)cancelAnimationFrame(raf);
    raf=null; start=null; fill.style.width="0%"; label("HOLD TO OPEN"); }
  btn.addEventListener("pointerdown",begin);
  btn.addEventListener("pointerup",cancel);
  btn.addEventListener("pointercancel",cancel);
  $("#gpGateBack").onclick=closeOverlay;
}
function showGrownups(){
  overlay(`
    <div class="tag">FOR GROWN-UPS ONLY</div>
    <div class="bigsprite">${sp("ic_bolt",6)}</div>
    <h2>Secret Powers</h2>
    <button class="btn sky" id="openBooth">${sp("ic_mic",3)} OPEN VOICE BOOTH</button>
    <button class="btn sky" id="gpVoice">${sp("ic_sound_on",3)} NARRATOR VOICE</button>
    <button class="btn mint" id="gpBackup">${sp("ic_gem",3)} BACKUP GAME FILE</button>
    <button class="btn gold" id="gpRestore">${sp("ic_egg",3)} RESTORE FROM BACKUP</button>
    <input type="file" id="gpRestoreFile" accept=".json,application/json" style="display:none">
    <div class="gp" id="gpBackupMsg"><b>Backup:</b> saves EVERYTHING — game progress AND all the grandparent recordings — as one file. AirDrop it to a phone or "Save to Files". Restore merges a backup in: it only ever ADDS, never erases.</div>
    <button class="btn small muted" id="gpReset">RESET GAME PROGRESS</button>
    <div class="gp"><b>Judge's Throne:</b> After each quest, the iPad passes to a grandparent to judge. Tap MEH once to make the kids do it sillier; MAGNIFICENT to reward them.</div>
    <div class="gp"><b>Secret Chaos — Judge:</b> On the judge screen, <b>press &amp; HOLD "MEH"</b> for a moment. A tiny sparkle blinks — chaos is now armed and will strike on its own 15–60 seconds later. Untraceable.</div>
    <div class="gp"><b>Secret Chaos — Machine:</b> <b>Triple-tap the machine's face</b> quickly. (Kids "pet the rice cooker for luck" — your triple-tap looks the same.) Also arms a delayed chaos strike.</div>
    <div class="gp"><b>Couch Mode:</b> The sofa button (top) switches every quest to a seated version. Great for low-energy grown-ups.</div>
    <div class="gp"><b>Voice Booth:</b> Record the grandparents saying each word in their REAL voice. Whenever a recording exists, the game plays it instead of the robot voice — hearing Halmoni or Nai Nai beats the robot every time.</div>
    <div class="gp" style="text-align:center;color:var(--coral)"><b>Never reveal your power.</b></div>
    <button class="btn gold" id="closeGp">GOT IT</button>
    <p class="gloss">build 2026-07-19 13:14</p>
  `);
  $("#openBooth").onclick=()=>showVoiceBooth();
  $("#gpVoice").onclick=()=>showVoicePicker();
  $("#gpBackup").onclick=()=>exportBackup($("#gpBackupMsg"));
  $("#gpRestore").onclick=()=>$("#gpRestoreFile").click();
  $("#gpRestoreFile").onchange=function(){ const f=this.files&&this.files[0]; this.value=""; if(f) restoreFlow(f); };
  $("#gpReset").onclick=()=>confirmReset();
  $("#closeGp").onclick=closeOverlay;
}
/* Narrator voice picker: tap a voice to hear it AND make it the storyteller.
   English narration only — Korean/Mandarin word pronunciation is untouched,
   and grandparent recordings always beat any robot. Choice is per-device. */
const VOICE_PREVIEW="Great job, adventurers! You found a shiny new friend!";
function showVoicePicker(){
  loadVoices();
  // Re-rendering after a tap rebuilds the overlay; keep the family's scroll spot.
  const prevScroll=document.querySelector(".overlay")?.scrollTop||0;
  const ranked=englishVoices().slice(0,18);
  const auto=pickEnglishVoice();
  const isPicked=v=>!!S.voiceEn&&(v.voiceURI===S.voiceEn||v.name===S.voiceEn);
  const accent=v=>{ const l=(v.lang||"").toLowerCase();
    return l.startsWith("en-gb")?"British": l.startsWith("en-au")?"Australian": l.startsWith("en-ie")?"Irish":
           l.startsWith("en-za")?"South African": l.startsWith("en-in")?"Indian": l.startsWith("en-us")?"US":""; };
  const rows=ranked.map((r,i)=>
    `<button class="btn small ${isPicked(r.v)?"gold":"muted"}" data-vi="${i}" style="display:block;width:100%;margin:4px 0;text-align:left">`+
    `${isPicked(r.v)?sp("ic_star",2)+" ":""}${esc(r.v.name)}${accent(r.v)?` <span style="opacity:.65;font-size:11px">· ${accent(r.v)}</span>`:""}</button>`).join("");
  overlay(`
    <div class="tag">NARRATOR VOICE</div>
    <div class="bigsprite">${sp("machine_happy",6)}</div>
    <h2>PICK THE STORY VOICE</h2>
    <p class="gloss">This voice reads quests and praise in English. Tap one to hear it — the one you leave gold is the one the machine uses. Words in Korean/Chinese and grandparent recordings are never affected.</p>
    <button class="btn small ${S.voiceEn?"muted":"gold"}" id="vAuto" style="display:block;width:100%;margin:4px 0;text-align:left">${S.voiceEn?"":sp("ic_star",2)+" "}AUTO — best guess${auto?" ("+esc(auto.name)+")":""}</button>
    <div style="width:100%">${rows||'<p class="gloss">No voices found on this device yet — close and reopen this page.</p>'}</div>
    <div class="gp"><b>Want a MUCH smoother voice?</b> On the iPad: Settings &gt; Accessibility &gt; Spoken Content &gt; Voices &gt; English — download a voice marked <b>Enhanced</b> or <b>Premium</b> (Ava, Zoe, Evan…). It appears in this list and AUTO grabs it by itself. <b>Just downloaded one and it's not here?</b> Fully quit Safari (swipe it away in the app switcher) and reopen — Safari only notices new voices after a restart.</div>
    <button class="btn gold" id="vBack">DONE</button>
  `); // overlay() hydrates its own sp() canvases
  const ov=document.querySelector(".overlay"); if(ov) ov.scrollTop=prevScroll;
  $("#vBack").onclick=()=>showGrownups();
  $("#vAuto").onclick=async()=>{ S.voiceEn=null; await saveState(); speak(VOICE_PREVIEW,"en"); showVoicePicker(); };
  document.querySelectorAll("[data-vi]").forEach(b=>b.onclick=async()=>{
    const r=ranked[+b.dataset.vi]; if(!r) return;
    S.voiceEn=r.v.voiceURI||r.v.name; await saveState();
    speak(VOICE_PREVIEW,"en"); showVoicePicker();
  });
}
function restoreFlow(file){
  const r=new FileReader();
  r.onerror=()=>restoreResult("Couldn't read that file. Try picking it again.");
  r.onload=async()=>{
    const v=validateBackup(String(r.result||""));
    if(!v.ok){ restoreResult("Nothing was changed: "+v.why+"."); return; }
    const c=v.counts;
    overlay(`
      <div class="tag">RESTORE BACKUP</div>
      <div class="bigsprite">${sp("ic_egg",6)}</div>
      <h2>MERGE THIS BACKUP?</h2>
      <p>It holds <b>${c.creatures}</b> friend${c.creatures===1?"":"s"}, <b>${c.phrases}</b> phrasebook word${c.phrases===1?"":"s"} and <b>${c.clips}</b> recording${c.clips===1?"":"s"}${v.data.exportedAt?` (saved ${esc(String(v.data.exportedAt).slice(0,10))})`:""}.</p>
      <p class="gloss">Merging only ADDS — nothing on this iPad gets erased. If a word was recorded on both devices, the newer recording wins.</p>
      <button class="btn gold" id="doMerge">MERGE IT IN</button>
      <button class="btn small muted" id="noMerge">CANCEL</button>
    `);
    $("#noMerge").onclick=()=>showGrownups();
    $("#doMerge").onclick=async function(){
      this.disabled=true; this.textContent="MERGING…";
      try{
        const a=await importBackup(v.data);
        confetti(25);
        restoreResult(`Done! Added ${a.creatures} friend${a.creatures===1?"":"s"}, ${a.phrases} phrasebook word${a.phrases===1?"":"s"}, ${a.clips} new recording${a.clips===1?"":"s"}${a.updated?` and updated ${a.updated} with a newer version`:""}.`);
      }catch(e){ restoreResult("Merge hit a snag ("+esc(String((e&&e.message)||e))+") — your existing progress is untouched."); }
    };
  };
  r.readAsText(file);
}
function restoreResult(msg){
  showGrownups();
  const m=$("#gpBackupMsg"); if(m) m.innerHTML="<b>Restore:</b> "+msg;
}
function confirmReset(){
  const n=S.creatures.length, p=S.phrasebook.length;
  overlay(`
    <div class="tag">FULL RESET</div>
    <div class="bigsprite">${sp("machine_dizzy",6)}</div>
    <h2>START THE WHOLE GAME OVER?</h2>
    <p>This erases the family's shared progress: <b>${n}</b> friend${n===1?"":"s"}, <b>${p}</b> phrasebook word${p===1?"":"s"}, quest count and names. There is one save for the whole family — not one per kid.</p>
    <p class="gloss">Grandparent recordings are KEPT — a reset never touches them. Consider tapping BACKUP first anyway.</p>
    <button class="btn small muted" id="doReset">YES — ERASE PROGRESS</button>
    <button class="btn gold" id="noReset">KEEP OUR PROGRESS</button>
  `,true);
  $("#noReset").onclick=()=>showGrownups();
  $("#doReset").onclick=async()=>{
    await resetProgress();
    closeOverlay(); renderTabs("missions");
    showSetup(); // fresh start: pick language + names again
  };
}

/* ---------- machine face: pet-for-luck + secret triple-tap ---------- */
function setupMachinePet(){
  const cv=$("#machineCanvas"); let taps=[]; 
  cv.addEventListener("pointerdown",()=>{
    // cute wiggle + sparkle every tap (kids love it)
    if(!RM){ cv.animate?.([{transform:"rotate(-10deg)"},{transform:"rotate(10deg)"},{transform:"rotate(0)"}],{duration:280}); }
    flashCornerSparkNearMachine(); sfx("blip");
    const now=Date.now(); taps=taps.filter(t=>now-t<900); taps.push(now);
    if(taps.length>=3){ taps=[]; armChaosFuse(); }
  });
}
function flashCornerSparkNearMachine(){
  if(RM) return;
  const m=$("#machine").getBoundingClientRect();
  const s=document.createElement("div");
  s.style.cssText=`position:fixed;left:${m.left+30}px;top:${m.top+6}px;z-index:300;line-height:0`;
  s.innerHTML=sp("ic_sparkle",2); document.body.appendChild(s); hydrate(s);
  setTimeout(()=>s.remove(),500);
}

/* Visible error surface — there is no dev console on the iPad, so script
   errors must show on screen or "nothing happens" is all anyone ever sees. */
function showErrBanner(msg){
  let b=document.getElementById("errBanner");
  if(!b){ b=document.createElement("div"); b.id="errBanner";
    b.style.cssText="position:fixed;left:8px;bottom:8px;z-index:300;max-width:72vw;background:#4A3B6B;color:#fff;font:700 11px/1.4 Nunito,sans-serif;padding:8px 12px;border-radius:12px;opacity:.93;cursor:pointer;";
    b.onclick=()=>b.remove(); document.body.appendChild(b); }
  b.textContent="oops: "+msg+" (tap to hide)";
}
window.addEventListener("error",e=>showErrBanner(e.message||"script error"));
window.addEventListener("unhandledrejection",e=>showErrBanner((e.reason&&(e.reason.message||e.reason.name))||"promise error"));

/* ================= BOOT ================= */
(async function boot(){
  await loadState();
  requestPersist(); // fire-and-forget; only flips the booth durability note
  renderTabs("missions");
  updateHeader();
  drawMachineFace(); startMachineLoop();
  setupGrownupsGesture(); setupMachinePet();
  ambientSparkles();
  if(!S.lang){ showSetup(); }
  else renderMissionHome();
})();
</script>
