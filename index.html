<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Translation Machine 3000</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#4A3B6B; --cream:#FFFDF6;
  --sky1:#BFE7FF; --sky2:#E3D9FF; --sky3:#FFE1D6;
  --pink:#FF9EBB; --coral:#FF8A80; --gold:#F7C948; --mint:#7FE3C3; --blue:#8AC9FF; --lav:#C9B8F5;
  --card-shadow:0 10px 24px rgba(90,70,140,.18), 0 3px 0 rgba(90,70,140,.12);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif; color:var(--ink);
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:12px 12px 104px; overflow-x:hidden;
  user-select:none; -webkit-user-select:none;
  background:linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 55%, var(--sky3) 100%);
  background-attachment:fixed;
}
h1,h2,h3{font-family:'Baloo 2',system-ui,sans-serif;}
.px{image-rendering:pixelated; image-rendering:crisp-edges; display:inline-block; vertical-align:middle;}
.pixel{font-family:'Press Start 2P',monospace; letter-spacing:0;}

/* dreamy sky */
.cloud{position:fixed; background:rgba(255,255,255,.75); border-radius:999px; filter:blur(6px); z-index:0; pointer-events:none;}
.cloud.c1{width:220px;height:70px; top:8%; left:-60px; animation:drift 70s linear infinite;}
.cloud.c2{width:160px;height:52px; top:30%; right:-40px; animation:drift 90s linear infinite reverse;}
.cloud.c3{width:260px;height:80px; bottom:12%; left:10%; animation:drift 110s linear infinite;}
@keyframes drift{from{transform:translateX(-15vw)}to{transform:translateX(115vw)}}
.spark{position:fixed; z-index:0; pointer-events:none; animation:floatup 5s ease-in forwards;}
@keyframes floatup{from{transform:translateY(0) scale(1); opacity:.9}to{transform:translateY(-30vh) scale(.4); opacity:0}}

.wrap{width:100%; max-width:520px; display:flex; flex-direction:column; gap:14px; position:relative; z-index:1;}

/* MACHINE */
.machine{
  background:linear-gradient(180deg,#FFFFFF 0%, var(--cream) 100%);
  border:3px solid rgba(74,59,107,.22); border-radius:30px;
  box-shadow:var(--card-shadow); padding:12px 16px; position:relative;
  display:flex; align-items:center; gap:14px;
}
.machine .headwrap{position:relative; animation:bob 3.5s ease-in-out infinite; flex:0 0 auto;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.machine .orb{position:absolute; top:-6px; right:-14px; width:14px; height:14px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #fff, var(--gold) 60%);
  box-shadow:0 0 12px 3px rgba(247,201,72,.7); animation:orbfloat 2.6s ease-in-out infinite;}
@keyframes orbfloat{0%,100%{transform:translate(0,0)}50%{transform:translate(5px,-6px)}}
#machineCanvas{width:96px; height:96px; cursor:pointer;}
.machine .info{flex:1; min-width:0;}
.mtitle{font-family:'Press Start 2P'; font-size:11px; line-height:1.5; color:var(--ink); cursor:pointer;}
.lvl{font-family:'Baloo 2'; font-size:12px; font-weight:800; color:#9A8CC7; margin-top:3px;}
.hdr-tools{display:flex; align-items:center; gap:6px; margin-top:8px; flex-wrap:wrap;}
.toolbtn{background:linear-gradient(180deg,#fff,#EAF4FF); border:2px solid rgba(74,59,107,.28);
  border-radius:12px; padding:5px 7px; cursor:pointer; line-height:0; box-shadow:0 2px 5px rgba(90,70,140,.18);}
.toolbtn:active{transform:scale(.92);}
.toolbtn.on{background:linear-gradient(180deg,#FFE9A8,var(--gold)); border-color:rgba(122,90,0,.4);}
.langchip{font-family:'Baloo 2'; font-weight:800; font-size:13px; color:var(--ink);
  background:linear-gradient(180deg,#fff,#EAF4FF); border:2px solid rgba(74,59,107,.28);
  border-radius:999px; padding:6px 11px; box-shadow:0 2px 5px rgba(90,70,140,.18); cursor:pointer;}
.langchip:active{transform:scale(.94);}

/* STAGE */
.stage{
  background:linear-gradient(180deg,#FFFFFF 0%, var(--cream) 100%);
  border:3px solid rgba(74,59,107,.22); border-radius:34px;
  box-shadow:var(--card-shadow); padding:22px 18px; min-height:340px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  text-align:center; position:relative; overflow:hidden;
}
.stage .bigsprite{line-height:0; filter:drop-shadow(0 5px 6px rgba(90,70,140,.28));}
.stage h2{margin:0; font-size:25px; font-weight:800;}
.stage p{margin:0; font-size:17px; font-weight:800; line-height:1.5;}
.divider{color:var(--gold); font-family:'Press Start 2P'; font-size:9px; letter-spacing:4px;}
.native{font-family:'Baloo 2'; font-size:42px; font-weight:800; margin:2px 0;}
.roman{font-size:20px; font-weight:800; color:var(--coral);}
.gloss{font-size:15px; color:#9A8CC7; font-weight:800;}
.tag{font-family:'Press Start 2P'; font-size:10px; line-height:1.6; color:#7A5A00;
  background:linear-gradient(180deg,#FFE9A8,var(--gold)); border:2px solid rgba(122,90,0,.35);
  border-radius:999px; padding:7px 14px; box-shadow:0 3px 8px rgba(247,201,72,.5);}
.stepdots{display:flex; gap:8px; align-items:center; justify-content:center;}
.stepdots .sd{opacity:.3;} .stepdots .sd.on{opacity:1;}

/* BUTTONS */
.btn{font-family:'Baloo 2'; font-weight:800; font-size:20px; color:#fff;
  background:linear-gradient(180deg,var(--pink),var(--coral)); border:none; border-radius:999px;
  padding:16px 22px; width:100%; cursor:pointer; position:relative; overflow:hidden;
  box-shadow:0 5px 0 rgba(190,80,90,.55), 0 10px 18px rgba(255,138,128,.4);
  text-shadow:0 1px 2px rgba(0,0,0,.15); transition:transform .08s; display:flex;
  align-items:center; justify-content:center; gap:9px;}
.btn::before{content:""; position:absolute; top:4px; left:8%; width:84%; height:38%;
  background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,0)); border-radius:999px; pointer-events:none;}
.btn:active{transform:translateY(4px) scale(.98); box-shadow:0 1px 0 rgba(190,80,90,.55);}
.btn.mint{background:linear-gradient(180deg,#A9F0D8,var(--mint)); color:#1E6B52; text-shadow:none;
  box-shadow:0 5px 0 rgba(60,150,120,.5), 0 10px 18px rgba(127,227,195,.45);}
.btn.mint:active{box-shadow:0 1px 0 rgba(60,150,120,.5);}
.btn.sky{background:linear-gradient(180deg,#BFE0FF,var(--blue)); color:#1E4E7A; text-shadow:none;
  box-shadow:0 5px 0 rgba(70,130,190,.5), 0 10px 18px rgba(138,201,255,.45);}
.btn.sky:active{box-shadow:0 1px 0 rgba(70,130,190,.5);}
.btn.gold{background:linear-gradient(180deg,#FFE9A8,var(--gold)); color:#7A5A00; text-shadow:none;
  box-shadow:0 5px 0 rgba(180,140,20,.5), 0 10px 18px rgba(247,201,72,.5);}
.btn.gold:active{box-shadow:0 1px 0 rgba(180,140,20,.5);}
.btn.muted{background:linear-gradient(180deg,#E7E0F5,#C9B8F5); color:#4A3B6B; text-shadow:none;
  box-shadow:0 5px 0 rgba(120,100,170,.5), 0 10px 18px rgba(201,184,245,.45);}
.btn.muted:active{box-shadow:0 1px 0 rgba(120,100,170,.5);}
.btn.small{width:auto; font-size:16px; padding:11px 17px;}
.btn.huge{font-size:24px; padding:22px; min-height:88px;}
.btnrow{display:flex; gap:10px; width:100%; justify-content:center; flex-wrap:wrap;}

.holdbtn{background:linear-gradient(180deg,var(--pink),var(--coral));}
.holdfill{position:absolute; inset:0; width:0%; background:rgba(255,255,255,.5);}
.holdlabel{position:relative; z-index:1; display:flex; align-items:center; gap:8px;}
.bars{display:flex; gap:5px; justify-content:center; align-items:flex-end; height:34px;}
.bars i{width:8px; background:linear-gradient(180deg,var(--mint),#4FC9A4); border-radius:4px;
  animation:bar .5s infinite alternate; box-shadow:0 2px 4px rgba(60,150,120,.4);}
.bars i:nth-child(2){animation-delay:.1s}.bars i:nth-child(3){animation-delay:.2s}
.bars i:nth-child(4){animation-delay:.3s}.bars i:nth-child(5){animation-delay:.15s}
@keyframes bar{from{height:8px}to{height:32px}}

/* TABS */
.tabbar{position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  width:calc(100% - 24px); max-width:520px; display:flex; gap:6px;
  background:rgba(255,253,246,.92); backdrop-filter:blur(8px);
  border:3px solid rgba(74,59,107,.22); border-radius:999px; padding:8px; z-index:50;
  box-shadow:0 10px 24px rgba(90,70,140,.28);}
.tab{flex:1; font-family:'Baloo 2'; font-weight:800; font-size:13px; color:#9A8CC7;
  background:transparent; border:none; border-radius:999px; padding:6px 4px; cursor:pointer; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:2px;}
.tab .t> {line-height:0;}
.tab.active{background:linear-gradient(180deg,#FFE9A8,var(--gold)); color:#7A5A00; box-shadow:0 3px 8px rgba(247,201,72,.55);}

/* COLLECTION */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(104px,1fr)); gap:10px; width:100%;}
.card{border:2px solid rgba(74,59,107,.22); border-radius:18px; padding:8px 4px 6px; overflow:hidden; text-align:center;
  box-shadow:0 6px 14px rgba(90,70,140,.18); position:relative; line-height:0;}
.card.r0{background:linear-gradient(160deg,#FFF3F6,#FFDCE7);}
.card.r1{background:linear-gradient(160deg,#F0FBFF,#D6EEFF);}
.card.r2{background:linear-gradient(160deg,#F2FFF9,#D8F7EA);}
.card.r3{background:linear-gradient(160deg,#FFFBEE,#FFEFC2);}
.card.shiny{background:linear-gradient(160deg,#FFF7D6,#FFE28A); border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(247,201,72,.6), 0 6px 14px rgba(200,150,20,.4); animation:shinyglow 2s infinite;}
@keyframes shinyglow{50%{box-shadow:0 0 0 3px rgba(247,201,72,.9), 0 6px 18px rgba(200,150,20,.6);}}
.card .cn{font-family:'Baloo 2'; font-size:11px; font-weight:800; line-height:1.15; margin-top:4px;}
.card .cw{font-size:10px; font-weight:800; color:#9A8CC7; line-height:1.2;}
.card .badge{position:absolute; top:5px; right:6px; line-height:0;}
.pbrow{background:linear-gradient(180deg,#fff,#FBF7FF); border:2px solid rgba(74,59,107,.2);
  border-radius:18px; padding:9px 11px; display:flex; align-items:center; gap:9px; width:100%;
  box-shadow:0 5px 12px rgba(90,70,140,.15);}
.pbrow .pt{flex:1; text-align:left;}
.pbrow .pn{font-family:'Baloo 2'; font-weight:800; font-size:16px;}
.pbrow .pr{font-size:13px; color:var(--coral); font-weight:800;}
.pbrow .pg{font-size:12px; color:#9A8CC7; font-weight:800;}
.speak{background:linear-gradient(180deg,#BFE0FF,var(--blue)); border:none; border-radius:12px;
  padding:8px 9px; cursor:pointer; box-shadow:0 3px 0 rgba(70,130,190,.5); line-height:0;}
.speak:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(70,130,190,.5);}
.meter{width:100%; background:#fff; border:2px solid rgba(74,59,107,.25); border-radius:999px;
  height:20px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(90,70,140,.15);}
.meter i{display:block; height:100%; background:linear-gradient(90deg,var(--gold),#FFB86B);
  transition:width .5s; border-radius:999px;}

/* OVERLAYS */
.overlay{position:fixed; inset:0; background:rgba(120,100,180,.4); backdrop-filter:blur(5px);
  z-index:100; display:flex; align-items:center; justify-content:center; padding:16px;}
.omodal{background:linear-gradient(180deg,#FFFFFF,var(--cream)); border:3px solid rgba(74,59,107,.25);
  border-radius:34px; box-shadow:0 16px 40px rgba(90,70,140,.4); padding:24px 20px; max-width:440px;
  width:100%; text-align:center; display:flex; flex-direction:column; gap:13px; align-items:center;
  animation:pop .35s cubic-bezier(.2,1.6,.4,1); max-height:92vh; overflow-y:auto;}
@keyframes pop{from{transform:scale(.6); opacity:0}}
.omodal h2{margin:0; font-size:25px;}
.omodal p{margin:0; font-weight:800; line-height:1.5;}
.omodal .bigsprite{line-height:0; filter:drop-shadow(0 5px 6px rgba(90,70,140,.28));}
.omodal.alarm{background:linear-gradient(180deg,#FF9EBB,#FF8A80); color:#fff;
  animation:pop .35s cubic-bezier(.2,1.6,.4,1), alarmflash 1s infinite;}
@keyframes alarmflash{50%{filter:brightness(.9)}}
.countdown{font-family:'Press Start 2P'; font-size:56px; line-height:1.2; text-shadow:0 4px 0 rgba(0,0,0,.12);}
.shake{animation:shakescreen .5s;}
@keyframes shakescreen{0%,100%{transform:translate(0)}20%{transform:translate(-8px,4px)}40%{transform:translate(8px,-4px)}60%{transform:translate(-6px,-4px)}80%{transform:translate(6px,4px)}}
.egg{cursor:pointer; animation:eggwiggle .6s infinite; line-height:0; filter:drop-shadow(0 6px 8px rgba(90,70,140,.3));}
@keyframes eggwiggle{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.confetti{position:fixed; top:-24px; z-index:200; animation:fall linear forwards; pointer-events:none; line-height:0;}
@keyframes fall{to{transform:translateY(112vh) rotate(720deg)}}
.score{font-family:'Press Start 2P'; font-size:44px; line-height:1.3;
  background:linear-gradient(180deg,var(--mint),#3FBF98); -webkit-background-clip:text; background-clip:text; color:transparent;}
.hatchspark{position:absolute; line-height:0; animation:hspark 1.2s infinite;}
@keyframes hspark{0%,100%{opacity:.3; transform:scale(.8)}50%{opacity:1; transform:scale(1.2)}}

.langpick{display:flex; flex-direction:column; gap:11px; width:100%;}
.namechips{display:flex; flex-wrap:wrap; gap:8px; justify-content:center;}
.namechip{font-family:'Baloo 2'; font-weight:800; font-size:15px; color:var(--ink);
  background:#fff; border:2px solid rgba(74,59,107,.3); border-radius:999px; padding:9px 14px; cursor:pointer;}
.namechip.sel{background:linear-gradient(180deg,#A9F0D8,var(--mint)); border-color:rgba(60,150,120,.5);}
.kidlist{display:flex; flex-direction:column; gap:7px; width:100%;}
input[type=text]{width:100%; font-family:'Nunito'; font-weight:800; font-size:18px; color:var(--ink);
  border:3px solid rgba(74,59,107,.3); border-radius:999px; padding:13px 17px; background:#fff;
  box-shadow:inset 0 2px 6px rgba(90,70,140,.12); outline:none; user-select:text; -webkit-user-select:text;}
input[type=text]:focus{border-color:var(--blue);}
.gp{font-size:13px; font-weight:800; line-height:1.6; text-align:left; color:var(--ink);
  background:#FBF7FF; border:2px solid rgba(74,59,107,.2); border-radius:16px; padding:12px 14px; width:100%;}
.gp b{color:var(--coral);}
.hidden{display:none !important;}
@media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>

      <div class="lvl" id="machineLvl">LEVEL 1</div>
      <div class="hdr-tools" id="hdrTools"></div>
    </div>
  </div>
  <div class="stage" id="stage"></div>
</div>

<div class="tabbar" id="tabbar"></div>
<div id="overlayRoot"></div>

/* ---------- SPRITE RENDER ---------- */
function sp(name, scale, opts={}){
  let s = SPR[name]; if(!s) return "";
  let shiny = !!opts.shiny;
  if(shiny && SPR[name+"_shiny"]){ name=name+"_shiny"; s=SPR[name]; shiny=false; }
  return `<canvas class="px" width="${s.w}" height="${s.h}" data-sprite="${name}"${shiny?' data-shiny="1"':''} `+
         `style="width:${s.w*scale}px;height:${s.h*scale}px"></canvas>`;
}
function hydrate(root){
  (root||document).querySelectorAll('canvas[data-sprite]:not([data-done])').forEach(cv=>{
    const s = SPR[cv.dataset.sprite]; if(!s) return;
    const ctx = cv.getContext("2d");
    const shiny = cv.dataset.shiny==="1";
    const rows = (cv.dataset.frame==="2" && s.rows2) ? s.rows2 : s.rows;
    ctx.clearRect(0,0,s.w,s.h);
    for(let r=0;r<s.h;r++) for(let c=0;c<s.w;c++){
      const idx = parseInt(rows[r][c],16); if(!idx) continue;
      ctx.fillStyle = (shiny?GOLD[idx]:s.pal[idx]) || "#ff00ff";
      ctx.fillRect(c,r,1,1);
    }
    cv.dataset.done="1";
  });
}

/* ---------- MACHINE FACE ---------- */
let machineMood="idle", machineTimer=null;
function drawMachineFace(){
  const cv = document.getElementById("machineCanvas"); if(!cv) return;
  let name = "machine_"+machineMood;
  if(!SPR[name]) name="machine_idle";
  const s = SPR[name]; const ctx = cv.getContext("2d");
  if(cv.width!==s.w){ cv.width=s.w; cv.height=s.h; }
  ctx.clearRect(0,0,s.w,s.h);
  for(let r=0;r<s.h;r++) for(let c=0;c<s.w;c++){
    const idx = parseInt(s.rows[r][c],16); if(!idx) continue;
    ctx.fillStyle = s.pal[idx]; ctx.fillRect(c,r,1,1);
  }
}
function mood(m){ machineMood=m; drawMachineFace(); }
function startMachineLoop(){
  if(RM){ drawMachineFace(); return; }
  setInterval(()=>{
    if(machineMood==="idle"){
      // occasional blink
      if(Math.random()<0.25){
        const cv=document.getElementById("machineCanvas"); if(!cv)return;
        const s=SPR.machine_blink, ctx=cv.getContext("2d");
        if(cv.width!==s.w){ cv.width=s.w; cv.height=s.h; }
        ctx.clearRect(0,0,s.w,s.h);
        for(let r=0;r<s.h;r++)for(let c=0;c<s.w;c++){const idx=parseInt(s.rows[r][c],16);if(!idx)continue;ctx.fillStyle=s.pal[idx];ctx.fillRect(c,r,1,1);}
        setTimeout(drawMachineFace,160);
      }
    }
  }, 900);
}

/* ---------- SOUND (8-bit WebAudio) ---------- */
let actx=null;
function unlockAudio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended") actx.resume(); }catch(e){} }
window.addEventListener("pointerdown", unlockAudio, {once:false});
function tone(f,dur,type,vol,when){
  if(!S.sound||!actx) return;
  const t=actx.currentTime+(when||0);
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type||"square"; o.frequency.value=f;
  o.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(vol||0.05,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur);
}
function sfx(name){
  if(!S.sound) return; unlockAudio(); if(!actx) return;
  const N={C:523,D:587,E:659,G:784,A:880,C2:1047,E2:1319,G2:1568};
  if(name==="blip") tone(880,0.06,"square",0.04);
  else if(name==="verdict"){ [N.C,N.E,N.G].forEach((f,i)=>tone(f,0.12,"square",0.05,i*0.09)); }
  else if(name==="hatch"){ [N.C,N.E,N.G,N.C2].forEach((f,i)=>tone(f,0.14,"square",0.05,i*0.1)); }
  else if(name==="shiny"){ [N.G,N.C2,N.E2,N.G2,N.E2,N.G2].forEach((f,i)=>tone(f,0.13,"triangle",0.05,i*0.1)); }
  else if(name==="levelup"){ [N.C,N.G,N.C2,N.E2,N.G2].forEach((f,i)=>tone(f,0.13,"square",0.05,i*0.09)); }
  else if(name==="alarm"){ tone(700,0.15,"square",0.06,0); tone(500,0.15,"square",0.06,0.16); tone(700,0.15,"square",0.06,0.32); }
  else if(name==="boss"){ [392,392,466,523].forEach((f,i)=>tone(f,0.16,"sawtooth",0.05,i*0.14)); }
  else if(name==="bonk") tone(160,0.12,"square",0.06);
  else if(name==="chime"){ tone(1047,0.12,"triangle",0.05,0); tone(1319,0.2,"triangle",0.05,0.13); }
}

// Pick the friendliest available English voice (avoids the flat default robot voice).
// Names vary by device; we rank known-good natural voices, then fall back gracefully.
const EN_VOICE_PREFS=["samantha","ava","allison","karen","moira","serena","google us english",
  "microsoft aria","microsoft jenny","microsoft zira","fiona","tessa","nicky","female"];
let enVoiceCache=null, enVoiceResolvedFrom=0;
function pickEnglishVoice(){
  if(enVoiceCache && enVoiceResolvedFrom===voices.length) return enVoiceCache;
  const en=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith("en"));
  if(!en.length){ enVoiceCache=null; enVoiceResolvedFrom=voices.length; return null; }
  let best=null;
  // prefer voices flagged non-"default" and matching a friendly name, in rank order
  for(const pref of EN_VOICE_PREFS){
    best=en.find(v=>v.name&&v.name.toLowerCase().includes(pref));
    if(best) break;
  }
  // otherwise prefer a local (higher quality) US/GB voice over any remote/default
  if(!best) best=en.find(v=>v.localService&&/en-(us|gb)/i.test(v.lang));
  if(!best) best=en.find(v=>/en-(us|gb)/i.test(v.lang));
  if(!best) best=en[0];
  enVoiceCache=best; enVoiceResolvedFrom=voices.length; return best;
}

function speak(text,lang,opts={}){
  if(!window.speechSynthesis) return;
  try{ speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const isEn = lang==="en" || lang==="en-US";
    if(isEn){
      // Friendly English narrator voice + warmer, less flat delivery.
      const v=pickEnglishVoice();
      if(v) u.voice=v;
      u.lang="en-US";
      u.rate=opts.rate??0.95;      // a touch slower = warmer, clearer for kids
      u.pitch=opts.pitch??1.15;    // gently higher = brighter/friendlier default
    } else {
      // Foreign-language pronunciation: unchanged.
      const v=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(lang));
      if(v) u.voice=v;
      u.lang=lang==="ko"?"ko-KR":lang==="zh"?"zh-CN":"en-US";
      u.rate=opts.rate??0.8; u.pitch=opts.pitch??1;
    }
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- STORAGE SHIM ---------- */
/* Real Safari has no host-provided window.storage bridge (only the QA harness
   and artifact hosts do). Without this, saves silently vanish on the iPad. */
if(!window.storage){
  window.storage={
    get:async k=>{ try{ const v=localStorage.getItem(k); return v==null?null:{value:v}; }catch(e){ return null; } },
    set:async(k,v)=>{ try{ localStorage.setItem(k,v); }catch(e){} return {value:v}; },
    delete:async k=>{ try{ localStorage.removeItem(k); }catch(e){} },
    list:async()=>{ try{ return {keys:Object.keys(localStorage)}; }catch(e){ return {keys:[]}; } }
  };
}

/* ---------- RECORDED VOICES (the family IS the audio engine) ---------- */
/* Clips live in IndexedDB (localStorage is too small for audio), keyed
   word|lang|speaker. Playback picks the most recent clip for a word+lang.
   If IndexedDB is unavailable, clips fall back to an in-memory store that
   lasts for the session — the booth warns when that happens. */
const TM_AUDIO=(()=>{
  let db=null, dbFailed=false, player=null;
  const mem=new Map(), urlCache=new Map();
  function open(){
    return new Promise(res=>{
      if(db) return res(db);
      if(dbFailed||!window.indexedDB) return res(null);
      try{
        const rq=indexedDB.open("tm3000-audio",1);
        rq.onupgradeneeded=()=>{ const d=rq.result;
          if(!d.objectStoreNames.contains("clips")){
            const st=d.createObjectStore("clips",{keyPath:"id"});
            st.createIndex("byWordLang","wl");
          } };
        rq.onsuccess=()=>{ db=rq.result; res(db); };
        rq.onerror=()=>{ dbFailed=true; res(null); };
      }catch(e){ dbFailed=true; res(null); }
    });
  }
  const keyId=(w,l,s)=>w+"|"+l+"|"+(s||"anon");
  async function save(wordId,lang,speaker,blob){
    const rec={id:keyId(wordId,lang,speaker),wl:wordId+"|"+lang,wordId,lang,
               speaker:speaker||"anon",blob,mime:blob.type||"",ts:Date.now()};
    const old=urlCache.get(rec.id); if(old){ try{URL.revokeObjectURL(old);}catch(e){} urlCache.delete(rec.id); }
    const d=await open();
    if(d){ try{
      await new Promise((res,rej)=>{ const t=d.transaction("clips","readwrite");
        t.objectStore("clips").put(rec); t.oncomplete=res; t.onerror=()=>rej(t.error); });
      return true;
    }catch(e){} }
    mem.set(rec.id,rec); return false; // saved, but not durable
  }
  async function allFor(wordId,lang){
    const wl=wordId+"|"+lang, out=[];
    const d=await open();
    if(d){ try{
      const recs=await new Promise((res,rej)=>{ const rq=d.transaction("clips").objectStore("clips").index("byWordLang").getAll(wl);
        rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); });
      out.push(...recs);
    }catch(e){} }
    mem.forEach(r=>{ if(r.wl===wl) out.push(r); });
    return out;
  }
  async function latest(wordId,lang){
    const recs=await allFor(wordId,lang);
    if(!recs.length) return null;
    recs.sort((a,b)=>b.ts-a.ts); return recs[0]; // most-recent-wins
  }
  async function play(wordId,lang){
    const rec=await latest(wordId,lang); if(!rec) return false;
    let url=urlCache.get(rec.id);
    if(!url){ try{ url=URL.createObjectURL(rec.blob); }catch(e){ return false; } urlCache.set(rec.id,url); }
    try{ if(player) player.pause();
      player=new Audio(url); await player.play(); return true;
    }catch(e){ return false; }
  }
  async function counts(lang){ // set of wordIds that have >=1 clip in lang
    const ids=new Set();
    const d=await open();
    if(d){ try{
      const recs=await new Promise((res,rej)=>{ const rq=d.transaction("clips").objectStore("clips").getAll();
        rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); });
      recs.forEach(r=>{ if(r.lang===lang) ids.add(r.wordId); });
    }catch(e){} }
    mem.forEach(r=>{ if(r.lang===lang) ids.add(r.wordId); });
    return ids;
  }
  function durable(){ return !dbFailed && !!window.indexedDB; }
  return {save,latest,play,counts,durable};
})();

const TM_REC=(()=>{
  let mr=null, chunks=[], stream=null;
  function pickMime(){
    // iOS Safari records AAC in an mp4 container, not webm — feature-detect.
    for(const m of ["audio/mp4","audio/webm;codecs=opus","audio/webm"]){
      try{ if(MediaRecorder.isTypeSupported(m)) return m; }catch(e){}
    }
    return "";
  }
  const supported=()=> !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.MediaRecorder);
  async function start(){
    if(!supported()) throw new Error("no-recorder");
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const m=pickMime(); chunks=[];
    mr=new MediaRecorder(stream, m?{mimeType:m}:undefined);
    mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
    mr.start();
  }
  function stop(){
    return new Promise((res,rej)=>{
      if(!mr) return rej(new Error("not-recording"));
      mr.onstop=()=>{
        const type=(mr&&mr.mimeType)||(chunks[0]&&chunks[0].type)||"audio/mp4";
        const blob=new Blob(chunks,{type});
        if(stream) stream.getTracks().forEach(t=>t.stop());
        mr=null; stream=null; chunks=[]; res(blob);
      };
      try{ mr.stop(); }catch(e){ rej(e); }
    });
  }
  function cancel(){ try{ if(mr) mr.stop(); }catch(e){} if(stream) stream.getTracks().forEach(t=>t.stop()); mr=null; stream=null; chunks=[]; }
  const recording=()=> !!mr;
  return {supported,start,stop,cancel,recording};
})();

/* Word pronunciation: recorded family voice first. Korean may fall back to
   ko-KR TTS. The Chinese side of this family speaks Taishanese — zh-CN TTS
   is Mandarin, the WRONG language, so with no clip the machine "can't say
   this one": think-face + chime = a grown-up says it instead. */
let speakWordTimer=null;
async function speakWord(w, langKey, opts={}){
  if(await TM_AUDIO.play(w.id, langKey)) return true;
  if(langKey==="ko"){ speak(w.ko,"ko",opts); return true; }
  mood("think"); sfx("chime");
  if(speakWordTimer) clearTimeout(speakWordTimer);
  speakWordTimer=setTimeout(()=>{ if(machineMood==="think") mood("idle"); },1600);
  return false;
}

/* Hold-to-finish */
function setupHold(onDone){
  const btn=$("#holdBtn"), fill=$("#holdFill"); let raf=null,start=null;
  function begin(e){ e.preventDefault(); mood("think"); start=performance.now();
    btn.querySelector(".holdlabel").innerHTML=sp("ic_mic",3)+" LISTENING...";
    (function step(t){ const p=Math.min((t-start)/2200,1); fill.style.width=(p*100)+"%";
      if(p>=1){ raf=null; start=null; btn.removeEventListener("pointerdown",begin); onDone(); return; }
      raf=requestAnimationFrame(step); })(performance.now());
  }
  function cancel(){ if(start===null)return; if(raf)cancelAnimationFrame(raf); start=null; fill.style.width="0%"; mood("idle");
    btn.querySelector(".holdlabel").innerHTML=sp("ic_mic",3)+" HOLD & SAY IT!"; }
  btn.addEventListener("pointerdown",begin);
  btn.addEventListener("pointerup",cancel);
  btn.addEventListener("pointerleave",cancel);
}

/* ================= CHAOS ================= */
function runChaos(c, onDone){
  mood("dizzy");
  const useCouch = S.couch && c.couchTxt;
  const txt = useCouch ? c.couchTxt : c.txt;
  if(c.countdown){
    overlay(`<div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${txt}</p><div class="countdown pixel" id="cd">${c.countdown}</div>`, c.alarm);
    sfx("alarm"); if(c.say) speak(c.say,"en",{rate:1.05,pitch:c.id==="freeze"?0.6:1.3});
    let n=c.countdown;
    const iv=setInterval(()=>{ n--; const cd=document.getElementById("cd"); if(cd)cd.textContent=n;
      if(n<=0){ clearInterval(iv); closeOverlay(); confetti(30); onDone(); } },1000);
  } else if(c.sneeze){
    overlay(`<div class="bigsprite">${sp("machine_dizzy",7)}</div><h2>${c.t}</h2><p>${txt}</p>`);
    setTimeout(()=>{ document.body.classList.add("shake"); speak("Ahh... ahh... CHOO!","en",{rate:0.9,pitch:0.7}); sfx("bonk");
      overlay(`<div class="bigsprite">${sp("machine_dizzy",7)}</div><h2>AAACHOO!!</h2><p>The machine sneezed words EVERYWHERE!</p><button class="btn mint" id="bless">Say "BLESS YOU!"</button>`);
      confetti(60); setTimeout(()=>document.body.classList.remove("shake"),600);
      $("#bless").onclick=()=>{ closeOverlay(); onDone(); };
    },1500);
  } else if(c.robot){
    const L=currentMission?currentMission.L:LANGS[sessionLangKey()];
    const w=currentMission?currentMission.w:rand(WORDS);
    overlay(`<div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${txt}</p><button class="btn sky" id="sing">${sp("ic_music",3)} START THE SONG</button>`);
    $("#sing").onclick=()=>{ speak(L.native(w)+"... "+L.native(w)+"... "+L.native(w), L.code, {rate:0.5,pitch:0.4});
      $("#sing").outerHTML=`<button class="btn mint" id="sung">WE SANG IT!</button>`;
      $("#sung").onclick=()=>{ closeOverlay(); onDone(); }; };
  } else if(c.opposite){
    pendingChaosMods.opposite=true;
    overlay(`<div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${txt}</p><button class="btn gold" id="ok">UH OH...</button>`);
    $("#ok").onclick=()=>{ closeOverlay(); onDone(); };
  } else { /* pirate */
    pendingChaosMods.pirate=true;
    overlay(`<div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${txt}</p><button class="btn sky" id="ok">ARRR, FINE!</button>`);
    $("#ok").onclick=()=>{ closeOverlay(); onDone(); };
  }
}

/* ---------- CHAOS FUSE (delayed, secret) ---------- */
function armChaosFuse(){
  if(fuseArmedCount>=2) return;
  fuseArmedCount++;
  const delay=15000+Math.random()*45000;
  const timer=setTimeout(()=>{ fuseArmedCount=Math.max(0,fuseArmedCount-1); tryFireFuse(); }, delay);
  fuseTimers.push(timer);
}
function tryFireFuse(){
  // only interrupt safe screens; otherwise wait
  const safe = !busy() && ["questcard","home","translate","collection"].includes(currentScreen);
  if(!safe){ setTimeout(tryFireFuse, 1500); return; }
  const pool=CHAOS.filter(c=>!c.verdictOnly);
  const c=rand(pool);
  const resume=makeResume();
  overlay(`<div class="tag">${sp("ic_bell",3)} RANDOM CHAOS STRIKE!</div><div class="bigsprite">${sp(c.icon,7)}</div><h2>${c.t}</h2><p>${(S.couch&&c.couchTxt)?c.couchTxt:c.txt}</p><button class="btn coral" id="go">LET'S GO!</button>`);
  $("#go").onclick=()=>{ closeOverlay(); runChaos(c, resume); };
}
function makeResume(){
  const screen=currentScreen;
  if(screen==="questcard" && currentMission){ return ()=> currentMission.boss ? renderMissionHome() : showQuestCard(); }
  if(screen==="translate") return ()=>renderTranslate();
  if(screen==="collection") return ()=>renderCollection();
  return ()=>renderMissionHome();
}

function renderTranslate(){

async function doTranslate(){

  mood("think");
  render(`<div class="bigsprite">${sp("machine_think",7)}</div><h2>CRUNCHING...</h2><div class="bars"><i></i><i></i><i></i><i></i><i></i></div>`);
  if(Math.random()<0.22){ setTimeout(()=>translateGlitch(phrase),1100); return; }
  runRealTranslate(phrase);
}
function translateGlitch(phrase){
  mood("dizzy"); sfx("bonk");
  const g=rand([
    {icon:"ic_skull",t:"PIRATE MODE!",out:`"ARRR, ye scurvy ${esc(phrase)}, shiver me timbers!"`},
    {icon:"ic_bubble",t:"BABY MODE!",out:`"goo goo ba-ba ${esc((phrase.split(" ")[0]||"goo"))} ga-ga!"`},
    {icon:"ic_music",t:"ROBOT MODE!",out:`"BEEP BOOP ${esc(phrase.toUpperCase())} DOES NOT COMPUTE BZZT"`},
    {icon:"ic_star",t:"CHICKEN MODE!",out:`"Bok bok BOK bok baGAWK!"`}
  ]);
  render(`<div class="tag">GLITCH!</div><div class="bigsprite">${sp(g.icon,7)}</div><h2>${g.t}</h2>
    <p style="font-size:19px">${g.out}</p><p class="gloss">that's... not right.</p>
    <button class="btn gold" id="bonk">${sp("ic_hammer",3)} BONK IT TO FIX IT!</button>`);
  $("#bonk").onclick=()=>{ document.body.classList.add("shake"); speak("Ouch! Okay, fixing!","en",{rate:1.1,pitch:1.3}); sfx("bonk");
    setTimeout(()=>document.body.classList.remove("shake"),600);
    render(`<div class="bigsprite">${sp("machine_dizzy",7)}</div><h2>OW! FIXING...</h2><div class="bars"><i></i><i></i><i></i><i></i><i></i></div>`);
    runRealTranslate(phrase); };
}
async function runRealTranslate(phrase){
  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000,
        messages:[{role:"user",content:
`You are the translator inside a silly kids' game for a pre-K and 2nd grade child playing with their Korean and Chinese grandparents. Translate this phrase into Korean and Mandarin Chinese: "${phrase.replace(/"/g,"'")}"

Rules:
- Keep it natural and simple, the way you'd say it to a child.
- If the phrase is not appropriate for young kids, respond with exactly {"error":"silly"}
- Respond ONLY with JSON, no markdown, no backticks, in this exact shape:
{"ko":{"text":"한국어","roman":"simple romanization with hyphens"},"zh":{"text":"中文","pinyin":"pinyin with tones"},"en":"the original phrase cleaned up"}`
        }] })
    });
    const data=await response.json();
    const text=(data.content||[]).map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
    const j=JSON.parse(text);
    if(j.error) return showTooSilly(phrase);
    showTranslation(j);
  }catch(err){ console.error(err); showTooSilly(phrase,true); }
}
function showTooSilly(phrase,broken){
  mood("dizzy");
  render(`<div class="bigsprite">${sp("machine_dizzy",7)}</div>
    <h2>${broken?"BRAIN UNPLUGGED":"TOO SILLY!"}</h2>

    <button class="btn gold" id="again">TRY AGAIN</button>`);
  $("#again").onclick=renderTranslate;
}

    const cv=stage().querySelector('canvas[data-sprite="campfire"]'); if(!cv){ clearInterval(flickerIv); return; }

let boothLang=null, boothSpeaker=null, boothIdx=0, boothRec=false, boothHave=new Set();
function boothSpeakers(){
  const base = boothLang==="ko"?["Halmoni","Harabeoji"]:["Nai Nai","Ye Ye"];
  const extra = (S.players.judges||[]).filter(j=>!base.includes(j)&&j!=="Grandma"&&j!=="Grandpa");

async function boothSetLang(l){
  if(boothRec) return;

}
function renderBoothWord(){
  currentScreen="booth";
  const w=WORDS[boothIdx], L=LANGS[boothLang];
  const done=boothHave.has(w.id);
  const spk=boothSpeaker||boothSpeakers()[0];
  render(`

      <button class="btn small sky" id="bNext">&rarr;</button>
    </div>
    ${TM_AUDIO.durable()?"":`<p class="gloss">heads up: this device won't keep recordings after closing</p>`}
    <button class="btn small muted" id="bExit">BACK TO MENU</button>
  `);
  $("#bKo").onclick=()=>boothSetLang("ko");
  $("#bZh").onclick=()=>boothSetLang("zh");
  stage().querySelectorAll(".namechip").forEach(b=>b.onclick=()=>{ if(boothRec) return; boothSpeaker=b.dataset.n; renderBoothWord(); });
  const step=d=>{ if(boothRec) return; boothIdx=(boothIdx+d+WORDS.length)%WORDS.length; sfx("blip"); renderBoothWord(); };
  $("#bPrev").onclick=()=>step(-1);

    } else {
      try{ await TM_REC.start(); boothRec=true; mood("think"); sfx("blip"); renderBoothWord(); }
      catch(e){ boothMicError(); }
    }
  };

function setupGrownupsGesture(){
  const title=$("#machineTitle"); let timer=null;
  const start=e=>{ timer=setTimeout(showGrownups,1500); };
  const clear=()=>{ if(timer){clearTimeout(timer);timer=null;} };
  title.addEventListener("pointerdown",start);
  title.addEventListener("pointerup",clear);
  title.addEventListener("pointerleave",clear);
}
function showGrownups(){
  overlay(`
    <div class="tag">FOR GROWN-UPS ONLY</div>
    <div class="bigsprite">${sp("ic_bolt",6)}</div>
    <h2>Secret Powers</h2>
    <button class="btn sky" id="openBooth">${sp("ic_mic",3)} OPEN VOICE BOOTH</button>
    <div class="gp"><b>Judge's Throne:</b> After each quest, the iPad passes to a grandparent to judge. Tap MEH once to make the kids do it sillier; MAGNIFICENT to reward them.</div>
    <div class="gp"><b>Secret Chaos — Judge:</b> On the judge screen, <b>press &amp; HOLD "MEH"</b> for a moment. A tiny sparkle blinks — chaos is now armed and will strike on its own 15–60 seconds later. Untraceable.</div>
    <div class="gp"><b>Secret Chaos — Machine:</b> <b>Triple-tap the machine's face</b> quickly. (Kids "pet the robot for luck" — your triple-tap looks the same.) Also arms a delayed chaos strike.</div>
    <div class="gp"><b>Couch Mode:</b> The sofa button (top) switches every quest to a seated version. Great for low-energy grown-ups.</div>
    <div class="gp"><b>Voice Booth:</b> Record the grandparents saying each word in their REAL voice. The game plays their recording instead of the robot voice — and it's the ONLY way Chinese words get spoken out loud (the robot only knows Mandarin, not our Chinese).</div>
    <div class="gp" style="text-align:center;color:var(--coral)"><b>Never reveal your power.</b></div>
    <button class="btn gold" id="closeGp">GOT IT</button>
    <p class="gloss">build 2026-07-17 23:28</p>
  `);
  $("#openBooth").onclick=()=>showVoiceBooth();
  $("#closeGp").onclick=closeOverlay;
}

/* ---------- machine face: pet-for-luck + secret triple-tap ---------- */
function setupMachinePet(){
  const cv=$("#machineCanvas"); let taps=[]; 
  cv.addEventListener("pointerdown",()=>{
    // cute wiggle + sparkle every tap (kids love it)
    if(!RM){ cv.animate?.([{transform:"rotate(-10deg)"},{transform:"rotate(10deg)"},{transform:"rotate(0)"}],{duration:280}); }
    flashCornerSparkNearMachine(); sfx("blip");
    const now=Date.now(); taps=taps.filter(t=>now-t<900); taps.push(now);
    if(taps.length>=3){ taps=[]; armChaosFuse(); }
  });
}
function flashCornerSparkNearMachine(){
  if(RM) return;
  const m=$("#machine").getBoundingClientRect();
  const s=document.createElement("div");
  s.style.cssText=`position:fixed;left:${m.left+30}px;top:${m.top+6}px;z-index:300;line-height:0`;
  s.innerHTML=sp("ic_sparkle",2); document.body.appendChild(s); hydrate(s);
  setTimeout(()=>s.remove(),500);
}

/* ================= BOOT ================= */
(async function boot(){
  await loadState();
  renderTabs("missions");
  updateHeader();
  drawMachineFace(); startMachineLoop();
  setupGrownupsGesture(); setupMachinePet();
  ambientSparkles();
  if(!S.lang){ showSetup(); }
  else renderMissionHome();
})();
</script>
